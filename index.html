        let order = maxSiblingOrder(parentId);
        for (const line of lines) {
          order += 1;
          const id = makeId("node");
          const node = {
            id,
            parentId,
            label: line,
            source: "manual",
            order,
            updatedAt: nowIso(),
          };
          state.nodes.push(node);
          recordOp({ type: "add", id, parentId, label: line });
        }
        setStatus(`Added ${lines.length} item${lines.length === 1 ? "" : "s"}.`, "ok");
        el.draft.value = "";
        refreshMeta();
        renderTree();
        persistPipSnapshot();
      }

      function addItemsFromPrimaryAction() {
        const map = nodeMap();
        const selectedId = cleanText(state.selectedId, 80);
        const focusId = cleanText(state.focusRootId, 80);

        if (selectedId && map.has(selectedId)) {
          insertSiblingBelow(selectedId);
          return;
        }

        if (focusId && map.has(focusId)) {
          const focusNode = map.get(focusId);
          const newNode = {
            id: makeId("node"),
            parentId: focusNode.id,
            label: "",
            source: "manual",
            order: maxSiblingOrder(focusNode.id) + 1,
            updatedAt: nowIso(),
          };
          state.nodes.push(newNode);
          beginInlineEdit(newNode.id, {
            isNew: true,
            originalLabel: "",
            afterId: "",
            parentId: focusNode.id,
          });
          setStatus(`New item in "${focusNode.label}". Type to name it.`, "ok");
          return;
        }

        const newTopNode = {
          id: makeId("node"),
          parentId: "root",
          label: "",
          source: "manual",
          order: maxSiblingOrder("root") + 1,
          updatedAt: nowIso(),
        };
        state.nodes.push(newTopNode);
        beginInlineEdit(newTopNode.id, {
          isNew: true,
          originalLabel: "",
          afterId: "",
          parentId: "root",
        });
        setStatus("New top-level item. Type to name it.", "ok");
      }

      function addItemsToParent(parentId, lines) {
        const cleanLines = (Array.isArray(lines) ? lines : [])
          .map((s) => cleanText(s, 220))
          .filter(Boolean);
        if (!parentId || cleanLines.length === 0) return 0;
        let order = maxSiblingOrder(parentId);
        for (const line of cleanLines) {
          order += 1;
          const id = makeId("node");
          const node = {
            id,
            parentId,
            label: line,
            source: "manual",
            order,
            updatedAt: nowIso(),
          };
          state.nodes.push(node);
          recordOp({ type: "add", id, parentId, label: line });
        }
        return cleanLines.length;
      }

      function parsePathLabels(rawPath) {
        return String(rawPath || "")
          .split("/")
          .map((seg) => cleanText(seg, 120))
          .filter(Boolean);
      }

      function parseDirectedDraft(rawText) {
        const rawLines = String(rawText || "")
          .replace(/\r/g, "")
          .split("\n")
          .map((line) => cleanText(line, 360))
          .filter(Boolean);
        if (rawLines.length === 0) return null;
        const first = rawLines[0];
        let pathRaw = "";
        let firstBody = "";

        let m = first.match(/^add\s+to\s+\/(.+?)\s*:\s*(.+)$/i);
        if (m) {
          pathRaw = m[1] || "";
          firstBody = m[2] || "";
        } else {
          m = first.match(/^add\s+(.+?)\s+to\s+\/(.+)$/i);
          if (m) {
            firstBody = m[1] || "";
            pathRaw = m[2] || "";
          } else {
            m = first.match(/^to\s+\/(.+)$/i);
            if (m) pathRaw = m[1] || "";
          }
        }

        const pathLabels = parsePathLabels(pathRaw);
        if (pathLabels.length === 0) return null;
        const lines = [];
        if (firstBody) lines.push(firstBody);
        lines.push(...rawLines.slice(1));
        const bodyLines = lines
          .map((line) => cleanText(line, 220))
          .filter(Boolean);
        if (bodyLines.length === 0) return null;
        return { pathLabels, bodyLines };
      }

      function saveDirectedDraft(rawText) {
        const directed = parseDirectedDraft(rawText);
        if (!directed) return false;
        const target = ensurePathNode(directed.pathLabels);
        if (!target) {
          setStatus("Could not resolve destination path.", "warn");
          return true;
        }
        const added = addItemsToParent(target.id, directed.bodyLines);
        if (added <= 0) {
          setStatus("Nothing to save.", "warn");
          return true;
        }
        state.selectedId = target.id;
        expandPathToNode(target.id);
        el.draft.value = "";
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus(`Saved ${added} item${added === 1 ? "" : "s"} in ${getPath(target.id)}.`, "ok");
        return true;
      }

      function openCopyTemplates() {
        const copyNode = findPathNode(["Work (CoA)", "Projects", "Copy Templates"]) || findPathNode(["Copy Templates"]);
        if (!copyNode) {
          setStatus('Could not find "Copy Templates" in this tree.', "warn");
          return;
        }
        state.selectedId = copyNode.id;
        state.focusRootId = copyNode.id;
        expandPathToNode(copyNode.id);
        el.search.value = "";
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus('Copy Templates focused. Single-click a template item to copy.', "ok");
      }

      function rememberNow() {
        const lines = el.draft.value.split(/\r?\n/).map((s) => cleanText(s, 220)).filter(Boolean);
        if (lines.length === 0) {
          setStatus("Type one or more lines to remember.", "warn");
          return;
        }
        const map = nodeMap();
        let target = state.focusRootId ? map.get(state.focusRootId) : null;
        if (!target) {
          target = findPathNode(["Work (CoA)", "Current"]) || ensurePathNode(["Work (CoA)", "Current"]);
        }
        if (!target) {
          setStatus('Could not find or create "Work (CoA) > Current".', "warn");
          return;
        }
        const added = addItemsToParent(target.id, lines);
        state.selectedId = target.id;
        expandPathToNode(target.id);
        el.draft.value = "";
        refreshMeta();
        renderTree();
        setStatus(`Remembered ${added} item${added === 1 ? "" : "s"} in ${getPath(target.id)}.`, "ok");
      }

      function renameSelected() {
        if (!state.selectedId) {
          setStatus("Select a node first.", "warn");
          return;
        }
        const map = nodeMap();
        const node = map.get(state.selectedId);
        if (!node) {
          setStatus("Selected node was not found.", "warn");
          return;
        }
        if (state.inlineEdit.id === node.id) {
          focusRowByNodeId(node.id);
          setStatus("Already renaming. Enter saves, Esc cancels.", "ok");
          return;
        }
        beginInlineEdit(node.id, {
          isNew: false,
          originalLabel: node.label || "",
          afterId: "",
          parentId: node.parentId || "root",
        });
        setStatus(`Renaming "${node.label}". Enter saves, Esc cancels.`, "ok");
      }

      function collectSubtreeIds(rootId) {
        const byParent = childrenMap();
        const out = [];
        const q = [rootId];
        const seen = new Set();
        while (q.length > 0) {
          const id = q.shift();
          if (!id || seen.has(id)) continue;
          seen.add(id);
          out.push(id);
          const kids = byParent.get(id) || [];
          for (const k of kids) q.push(k.id);
        }
        return out;
      }

      function deleteSelected() {
        if (!state.selectedId) {
          setStatus("Select a node first.", "warn");
          return;
        }
        deleteNodeById(state.selectedId, { confirm: true });
      }

      function downloadJson(name, payload) {
        const text = JSON.stringify(payload, null, 2);
        downloadText(name, text, "application/json");
      }

      function downloadText(name, text, mimeType = "text/plain") {
        const blob = new Blob([text], { type: mimeType });
        const href = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = href;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(href);
      }

      function fileStamp() {
        const d = new Date();
        const p = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
      }

      function buildPipUrl() {
        const u = new URL(window.location.href);
        u.searchParams.set("pip", "1");
        return u.toString();
      }

      function openPopupFallback() {
        const nextUrl = buildPipUrl();
        const popup = window.open(
          nextUrl,
          "pocketLitePopout",
          "popup=yes,width=620,height=820,resizable=yes,scrollbars=yes"
        );
        if (popup) {
          popup.focus();
          setStatus("Opened pop-out window.", "ok");
        } else {
          setStatus("Popup blocked. Allow popups for this page.", "warn");
        }
      }

      async function openPipWindow() {
        if (isPipMode) {
          setStatus("Already in pop-out mode.", "warn");
          return;
        }
        persistPipSnapshot();
        const dpip = window.documentPictureInPicture;
        if (!dpip || typeof dpip.requestWindow !== "function") {
          openPopupFallback();
          return;
        }
        try {
          const pipWin = await dpip.requestWindow({
            width: Math.max(540, Math.round(window.innerWidth * 0.72)),
            height: Math.max(640, Math.round(window.innerHeight * 0.86)),
          });
          const pipUrl = buildPipUrl();
          pipWin.document.open();
          pipWin.document.write(
            "<!doctype html><html><head><meta charset='utf-8'><title>Pocket Lite PiP</title>" +
            "<style>html,body{margin:0;height:100%;background:#f7f8f7}iframe{border:0;width:100%;height:100%}</style>" +
            "</head><body><iframe src=\"" + pipUrl.replace(/\"/g, "&quot;") + "\"></iframe></body></html>"
          );
          pipWin.document.close();
          setStatus("Opened PiP window.", "ok");
        } catch (err) {
          setStatus(`PiP unavailable: ${err && err.message ? err.message : "not supported"}`, "warn");
          openPopupFallback();
        }
      }

      function exportChanges() {
        if (state.nodes.length === 0) return;
        const entry = {
          schema: "pocket.change.v1",
          writtenAt: nowIso(),
          source: state.source,
          summary: {
            nodeCount: state.nodes.length,
            tombstoneCount: state.tombstones.length,
            operationCount: state.ops.length,
          },
          operations: state.ops,
          snapshot: {
            schema: "portal.export.v1",
            writtenAt: nowIso(),
            mainThoughtTree: state.nodes,
            mainThoughtTreeTombstones: state.tombstones,
            data: {
              ...(state.dataExtras || {}),
              mainThoughtTree: state.nodes,
              mainThoughtTreeTombstones: state.tombstones,
            },
          },
        };
        downloadText("pocket-change-log.ndjson", `${JSON.stringify(entry)}\n`, "application/x-ndjson");
        setStatus("Change log entry saved.", "ok");
      }

      async function writeTruthFile(payload) {
        const data = `${JSON.stringify(payload, null, 2)}\n`;
        const resolveSavePicker = () => {
          const scopes = [window];
          try {
            if (window.parent && window.parent !== window) scopes.push(window.parent);
          } catch {}
          try {
            if (window.top && window.top !== window && window.top !== window.parent) scopes.push(window.top);
          } catch {}
          for (const scope of scopes) {
            try {
              if (scope && typeof scope.showSaveFilePicker === "function") {
                return scope.showSaveFilePicker.bind(scope);
              }
            } catch {}
          }
          return null;
        };
        const pickHandle = async () => {
          const picker = resolveSavePicker();
          if (!picker) return null;
          return picker({
            suggestedName: "pocket-data.json",
            types: [{ description: "JSON", accept: { "application/json": [".json"] } }],
          });
        };
        const isAbortError = (err) => !!err && (
          err.name === "AbortError"
          || /abort/i.test(String(err.message || ""))
        );
        const writeWithHandle = async (handle) => {
          if (!handle || typeof handle.createWritable !== "function") {
            return { ok: false, reason: "unsupported" };
          }
          const writable = await handle.createWritable();
          try {
            await writable.write(data);
            await writable.close();
            return { ok: true };
          } catch (err) {
            try { await writable.abort?.(); } catch {}
            throw err;
          }
        };

        try {
          if (!truthFileHandle) {
            truthFileHandle = await pickHandle();
          }
          const firstAttempt = await writeWithHandle(truthFileHandle);
          if (firstAttempt.ok) return firstAttempt;
          // Retry once with a refreshed picker-selected handle.
          truthFileHandle = await pickHandle();
          const secondAttempt = await writeWithHandle(truthFileHandle);
          if (secondAttempt.ok) return { ok: true, retried: true };
          return secondAttempt;
        } catch (err) {
          if (isAbortError(err)) {
            return { ok: false, aborted: true, error: err };
          }
          truthFileHandle = null;
          return { ok: false, aborted: false, error: err };
        }
      }

      function enqueueTreeSave(task) {
        const run = async () => {
          state.saveInProgress = true;
          refreshMeta();
          try {
            return await task();
          } finally {
            state.saveInProgress = false;
            refreshMeta();
          }
        };
        const queued = exportTreeQueue.then(run, run);
        exportTreeQueue = queued.catch(() => {});
        return queued;
      }

      async function exportTree() {
        return enqueueTreeSave(async () => {
          if (state.nodes.length === 0) return false;
          const opsAtSaveStart = Array.isArray(state.ops) ? state.ops.length : 0;
          if (opsAtSaveStart === 0) {
            setStatus("No changes.", "ok");
            flashSaveChip("No changes");
            refocusTreeNavigation(state.selectedId);
            return false;
          }
          // Freeze a point-in-time snapshot so edits during save are not mixed
          // into this payload and their ops are preserved as unsaved.
          const treeNodes = JSON.parse(JSON.stringify(state.nodes || []));
          const treeTombstones = JSON.parse(JSON.stringify(state.tombstones || []));
          const rootExtras = JSON.parse(JSON.stringify(state.rootExtras || {}));
          const dataExtras = JSON.parse(JSON.stringify(state.dataExtras || {}));
          const payload = {
            ...rootExtras,
            // Dual-shape export for clean cross-import:
            // - portal.export.v1 (full app import path)
            // - top-level mainThoughtTree fields (Pocket Lite compatibility path)
            schema: "portal.export.v1",
            exportedAt: nowIso(),
            writtenAt: nowIso(),
            mainThoughtTree: treeNodes,
            mainThoughtTreeTombstones: treeTombstones,
            data: {
              ...dataExtras,
              mainThoughtTree: treeNodes,
              mainThoughtTreeTombstones: treeTombstones,
            },
          };
          saveLastSaveSnapshot(payload);
          if (el.btnRestoreLast) el.btnRestoreLast.disabled = !state.hasSaveSnapshot;
          const writeResult = await writeTruthFile(payload);
          if (writeResult.ok) {
            // Only clear ops that existed at save start.
            state.ops = Array.isArray(state.ops) ? state.ops.slice(opsAtSaveStart) : [];
            if (el.opsMeta) el.opsMeta.textContent = `Changes recorded: ${state.ops.length}`;
            if (state.ops.length > 0) {
              setStatus(`Saved snapshot. ${state.ops.length} newer change${state.ops.length === 1 ? "" : "s"} pending.`, "ok");
            } else {
              setStatus("Saved.", "ok");
            }
            flashSaveChip("Saved");
            refocusTreeNavigation(state.selectedId);
            return true;
          }
          if (writeResult.aborted) {
            setStatus("Save cancelled.", "warn");
            refocusTreeNavigation(state.selectedId);
            return false;
          }
          downloadJson("pocket-data.json", payload);
          setStatus("Could not overwrite truth file here, downloaded pocket-data.json instead.", "warn");
          refocusTreeNavigation(state.selectedId);
          return true;
        });
      }

      async function loadFromFile(file) {
        if (!file) return;
        let text = "";
        try {
          text = await file.text();
        } catch (err) {
          setStatus(`Could not read file: ${err && err.message ? err.message : "read failed"}`, "warn");
          return;
        }
        let parsed = null;
        try {
          parsed = JSON.parse(text);
        } catch (err) {
          const ndjsonEntries = parseNdjsonLines(text);
          const latestChange = pickLatestChangeSnapshot(ndjsonEntries);
          if (latestChange && latestChange.norm && Array.isArray(latestChange.norm.nodes) && latestChange.norm.nodes.length > 0) {
            snapshotCurrentTreeForRestore();
            applyLoadedState(latestChange.norm, {
              schema: latestChange.norm.schema || "pocket.change.v1",
              fileName: cleanText(file.name, 120),
              writtenAt: latestChange.writtenAt || latestChange.norm.writtenAt || "",
            });
            saveAutoCache(latestChange.norm, {
              schema: latestChange.norm.schema || "pocket.change.v1",
              fileName: cleanText(file.name, 120),
              writtenAt: latestChange.writtenAt || latestChange.norm.writtenAt || "",
            });
            setStatus(`Loaded ${state.nodes.length} node${state.nodes.length === 1 ? "" : "s"} from change log.`, "ok");
            return;
          }
          const queued = queuePathImport(text, {
            clearDraft: false,
            requireAnchor: true,
            sourceInfo: {
              schema: "path.lines",
              fileName: cleanText(file.name, 120),
              writtenAt: "",
            },
          });
          if (queued !== 0) return;
          setStatus(`File is not valid JSON: ${err && err.message ? err.message : "parse failed"}`, "warn");
          return;
        }

        const norm = normaliseInput(parsed);
        if (!Array.isArray(norm.nodes) || norm.nodes.length === 0) {
          const queued = queuePathImport(text, {
            clearDraft: false,
            requireAnchor: true,
            sourceInfo: {
              schema: "path.lines",
              fileName: cleanText(file.name, 120),
              writtenAt: "",
            },
          });
          if (queued !== 0) return;
          setStatus("No usable mainThoughtTree nodes were found in that file.", "warn");
          return;
        }
        snapshotCurrentTreeForRestore();
        applyLoadedState(norm, {
          schema: norm.schema || "",
          fileName: cleanText(file.name, 120),
          writtenAt: norm.writtenAt || "",
        });
        saveAutoCache(norm, {
          schema: norm.schema || "",
          fileName: cleanText(file.name, 120),
          writtenAt: norm.writtenAt || "",
        });
        setStatus(`Loaded ${state.nodes.length} node${state.nodes.length === 1 ? "" : "s"}.`, "ok");
      }

      function bind() {
        el.btnUnfoldAll?.addEventListener("click", toggleUnfoldAll);
        el.btnPaneOrder?.addEventListener("click", cyclePaneOrder);
        el.btnAddPrimary?.addEventListener("click", addItemsFromPrimaryAction);
        el.btnAddMobile?.addEventListener("click", addItemsFromPrimaryAction);
        el.btnMovePrimary?.addEventListener("click", () => toggleMoveMode());
        const bindMovePadButton = (button, direction) => {
          if (!button) return;
          button.addEventListener("pointerdown", (ev) => {
            if (ev.button !== 0) return;
            ev.preventDefault();
            startMovePadRepeat(direction);
          });
          button.addEventListener("pointerup", () => stopMovePadRepeat());
          button.addEventListener("pointercancel", () => stopMovePadRepeat());
          button.addEventListener("pointerleave", (ev) => {
            if (ev.buttons === 0) stopMovePadRepeat();
          });
          button.addEventListener("keydown", (ev) => {
            if (ev.key !== "Enter" && ev.key !== " ") return;
            ev.preventDefault();
            moveSelectedViaPad(direction);
          });
        };
        bindMovePadButton(el.btnMovePadUp, "up");
        bindMovePadButton(el.btnMovePadDown, "down");
        bindMovePadButton(el.btnMovePadLeft, "left");
        bindMovePadButton(el.btnMovePadRight, "right");
        document.addEventListener("pointerup", () => stopMovePadRepeat(), true);
        document.addEventListener("pointercancel", () => stopMovePadRepeat(), true);
        el.btnRenamePrimary?.addEventListener("click", renameSelected);
        el.btnDeletePrimary?.addEventListener("click", deleteSelected);
        el.btnOpenPrimary?.addEventListener("click", openDetailsEditorForSelectedNode);
        el.btnImportNow?.addEventListener("click", commitPendingPathImport);
        el.btnCancelImport?.addEventListener("click", cancelPendingPathImport);
        el.btnUndoImport?.addEventListener("click", undoLastImportBatch);
        el.btnLoad.addEventListener("click", () => el.fileInput.click());
        el.btnCopyTemplates?.addEventListener("click", openCopyTemplates);
        el.btnRememberNow?.addEventListener("click", rememberNow);
        el.btnPip?.addEventListener("click", () => {
          void openPipWindow();
        });
        el.fileInput.addEventListener("change", async (ev) => {
          const file = ev.target.files && ev.target.files[0] ? ev.target.files[0] : null;
          await loadFromFile(file);
          ev.target.value = "";
        });

        el.search.addEventListener("input", () => renderTree());
        el.search.addEventListener("keydown", (ev) => {
          if (ev.metaKey || ev.ctrlKey || ev.altKey || ev.shiftKey) return;
          if (ev.key === "Tab") {
            ev.preventDefault();
            const visibleIds = getVisibleNodeIdsInRenderOrder();
            const targetId = (state.selectedId && visibleIds.includes(state.selectedId))
              ? state.selectedId
              : (visibleIds[0] || state.selectedId || "");
            if (targetId) {
              state.selectedId = targetId;
              refreshMeta();
              renderTree();
              refocusTreeNavigation(targetId);
              return;
            }
            refocusTreeNavigation(state.selectedId);
            return;
          }
          if (ev.key === "Enter") {
            ev.preventDefault();
            const visibleIds = getVisibleNodeIdsInRenderOrder();
            const targetId = visibleIds[0] || state.selectedId || "";
            if (!targetId) {
              setStatus("No matching items.", "warn");
              return;
            }
            const map = nodeMap();
            const targetNode = map.get(targetId) || null;
            const targetHasKids = !!targetNode && sortNodesForParent(targetNode.id).length > 0;
            const copyOnEnter = !!targetNode && shouldCopyOnSingleClick(targetNode, targetHasKids);
            state.selectedId = targetId;
            if (copyOnEnter) {
              if (el.search instanceof HTMLInputElement && cleanText(el.search.value, 120)) {
                el.search.value = "";
              }
              refreshMeta();
              renderTree();
              refocusTreeNavigation(targetId);
              void copyText(targetNode.label).then((ok) => {
                if (ok) showCopiedFeedback(targetId);
              });
              return;
            }
            refreshMeta();
            renderTree();
            refocusTreeNavigation(targetId);
            return;
          }
          if (ev.key === "Escape") {
            ev.preventDefault();
            const hadFilter = cleanText(el.search.value, 120).length > 0;
            if (hadFilter) {
              el.search.value = "";
              renderTree();
            }
            refocusTreeNavigation(state.selectedId);
          }
        });
        el.treeWrap?.addEventListener("keydown", handleTreeKeydown);
        el.btnAddChild.addEventListener("click", addChildItems);
        el.btnRename.addEventListener("click", renameSelected);
        el.btnDelete.addEventListener("click", deleteSelected);
        el.btnMoveMode?.addEventListener("click", () => toggleMoveMode());
        el.btnFocusUp?.addEventListener("click", focusUpOneLevel);
        el.btnDetailSave?.addEventListener("click", saveDetailsEditor);
        el.btnDetailCancel?.addEventListener("click", () => {
          closeDetailsEditor({ restoreFocus: true });
          setStatus("Details edit cancelled.", "warn");
        });
        el.detailOverlay?.addEventListener("click", (ev) => {
          if (ev.target !== el.detailOverlay) return;
          closeDetailsEditor({ restoreFocus: true });
          setStatus("Details edit cancelled.", "warn");
        });
        el.detailEditorLabel?.addEventListener("keydown", handleDetailsEditorKeydown);
        el.detailEditorBody?.addEventListener("keydown", handleDetailsEditorKeydown);
        el.btnExportChanges.addEventListener("click", exportChanges);
        el.btnExportTree.addEventListener("click", () => {
          void exportTree();
        });
        el.titleToast?.addEventListener("click", (ev) => {
          if (!statusActionHandler) return;
          ev.preventDefault();
          ev.stopPropagation();
          const action = statusActionHandler;
          statusActionHandler = null;
          try {
            action();
          } catch (err) {
            console.error("[pocket-lite] status action failed:", err);
            setStatus("Could not complete action.", "warn");
          }
        });
        el.titleToast?.addEventListener("keydown", (ev) => {
          if (!statusActionHandler) return;
          if (ev.key !== "Enter" && ev.key !== " ") return;
          ev.preventDefault();
          ev.stopPropagation();
          const action = statusActionHandler;
          statusActionHandler = null;
          try {
            action();
          } catch (err) {
            console.error("[pocket-lite] status action failed:", err);
            setStatus("Could not complete action.", "warn");
          }
        });
        const handleGlobalShortcuts = (ev) => {
          const key = String(ev.key || "").toLowerCase();
          const target = ev.target instanceof HTMLElement ? ev.target : null;
          const tag = target ? String(target.tagName || "").toLowerCase() : "";
          const isEditableTarget = !!target && (target.isContentEditable || tag === "input" || tag === "textarea");
          if (
            key === "/"
            && !ev.metaKey
            && !ev.ctrlKey
            && !ev.altKey
            && !ev.shiftKey
            && !isEditableTarget
          ) {
            ev.preventDefault();
            ev.stopPropagation();
            if (el.search instanceof HTMLInputElement) {
              el.search.focus({ preventScroll: true });
              el.search.select();
            }
            return;
          }
          if (key === "escape") {
            const isInlineRenameInput = !!(target && (target.classList.contains("labelEdit") || target.closest(".labelEdit")));
            if (isInlineRenameInput) return;
            if (target === el.search) return;
            if (isDetailsEditorOpen()) {
              ev.preventDefault();
              ev.stopPropagation();
              closeDetailsEditor({ restoreFocus: true });
              setStatus("Details edit cancelled.", "warn");
              return;
            }
            if (state.moveMode) {
              ev.preventDefault();
              ev.stopPropagation();
              toggleMoveMode(false);
              refocusTreeNavigation(state.selectedId);
              return;
            }
            if (state.pendingPathImport && Number(state.pendingPathImport.pathCount || 0) > 0) {
              ev.preventDefault();
              ev.stopPropagation();
              cancelPendingPathImport();
              refocusTreeNavigation(state.selectedId);
              return;
            }
            const hasFilterText = cleanText(el.search?.value || "", 120).length > 0;
            if (hasFilterText && el.search instanceof HTMLInputElement) {
              ev.preventDefault();
              ev.stopPropagation();
              el.search.value = "";
              renderTree();
              refocusTreeNavigation(state.selectedId);
              setStatus("Filter cleared.", "ok");
              return;
            }
          }
          const hasPrimaryMod = ev.ctrlKey || ev.metaKey;
          if (!hasPrimaryMod || ev.altKey || ev.shiftKey) return;
          if (key === "z" && !isEditableTarget) {
            ev.preventDefault();
            ev.stopPropagation();
            undoMostRecentTreeMutation();
            refocusTreeNavigation(state.selectedId);
            return;
          }
          if (key === "s") {
            ev.preventDefault();
            ev.stopPropagation();
            void exportTree();
            return;
          }
          if (key === "f") {
            ev.preventDefault();
            ev.stopPropagation();
            if (el.search instanceof HTMLInputElement) {
              el.search.focus({ preventScroll: true });
              el.search.select();
            }
            return;
          }
          if (key === "c") {
            if (isEditableTarget || target === el.search) return;
            const selectedId = cleanText(state.selectedId, 80);
            if (!selectedId) return;
            const selectedNode = nodeMap().get(selectedId) || null;
            if (!selectedNode) return;
            ev.preventDefault();
            ev.stopPropagation();
            const hadFilterText = cleanText(el.search?.value || "", 120).length > 0;
            void copyText(selectedNode.label).then((ok) => {
              if (!ok) return;
              if (hadFilterText && el.search instanceof HTMLInputElement) {
                el.search.value = "";
                renderTree();
                refocusTreeNavigation(selectedId);
                showCopiedFeedback(selectedId);
                return;
              }
              showCopiedFeedback(selectedId);
            });
            return;
          }
        };
        window.addEventListener("keydown", handleGlobalShortcuts, { capture: true });
        document.addEventListener("keydown", handleGlobalShortcuts, { capture: true });
        window.addEventListener("beforeunload", (ev) => {
          const hasUnsavedChanges = Array.isArray(state.ops) && state.ops.length > 0;
          if (!hasUnsavedChanges) return;
          ev.preventDefault();
          ev.returnValue = "";
        });
        el.draft.addEventListener("keydown", (ev) => {
          const draftText = String(el.draft.value || "");
          const hasDraftText = !!cleanText(draftText, 2000);
          const isArrowKey = ev.key === "ArrowUp" || ev.key === "ArrowDown" || ev.key === "ArrowLeft" || ev.key === "ArrowRight";
          const isTreeArrowNavFromDraft = isArrowKey
            && !hasDraftText
            && !ev.altKey
            && !ev.shiftKey
            && !ev.metaKey
            && !ev.ctrlKey;
          const isTreeEdgeJumpFromDraft = (ev.key === "ArrowUp" || ev.key === "ArrowDown")
            && !hasDraftText
            && !ev.altKey
            && !ev.shiftKey
            && (ev.metaKey || ev.ctrlKey);
          if (isTreeArrowNavFromDraft || isTreeEdgeJumpFromDraft) {
            ev.preventDefault();
            if (el.treeWrap instanceof HTMLElement) {
              el.treeWrap.focus({ preventScroll: true });
            }
            handleTreeKeydown(ev);
            return;
          }
          const isTreeTabIndentFromDraft = ev.key === "Tab"
            && !hasDraftText
            && !!state.selectedId
            && !ev.altKey
            && !ev.metaKey
            && !ev.ctrlKey;
          if (isTreeTabIndentFromDraft) {
            ev.preventDefault();
            if (el.treeWrap instanceof HTMLElement) {
              el.treeWrap.focus({ preventScroll: true });
            }
            if (ev.shiftKey) outdentNodeById(state.selectedId);
            else indentNodeById(state.selectedId);
            return;
          }
          if (ev.key === "Escape") {
            ev.preventDefault();
            const hadText = String(el.draft.value || "").length > 0;
            const hadMoveMode = !!state.moveMode;
            const hadPendingImport = !!(state.pendingPathImport && Number(state.pendingPathImport.pathCount || 0) > 0);
            if (hadText) el.draft.value = "";
            if (hadMoveMode) state.moveMode = false;
            if (hadPendingImport) state.pendingPathImport = null;
            if (hadText || hadMoveMode || hadPendingImport) {
              refreshMeta();
              persistPipSnapshot();
              setStatus("Cleared.", "ok");
              showDraftHintToast();
            } else {
              setStatus("Nothing to clear.", "warn");
            }
            return;
          }
          if (ev.key !== "Enter") return;
          if (ev.altKey) return;
          if (ev.ctrlKey || ev.metaKey || ev.shiftKey) return;
          ev.preventDefault();
          if (!cleanText(draftText, 2000)) {
            const hasPendingImport = !!(state.pendingPathImport && Number(state.pendingPathImport.pathCount || 0) > 0);
            if (hasPendingImport) {
              commitPendingPathImport();
              showDraftHintToast();
              return;
            }
          }
          if (saveDirectedDraft(draftText)) {
            showDraftHintToast();
            return;
          }
          const queued = queuePathImport(draftText, {
            clearDraft: true,
            requireAnchor: true,
            sourceInfo: {
              schema: "path.lines",
              fileName: "Draft capture",
              writtenAt: "",
            },
          });
          if (queued === 0) {
            const pathIntent = analyseBulkPathIntent(draftText);
            if (pathIntent.isLikelyBulk) {
              setStatus(
                `Could not preview import. Parsed ${pathIntent.parsedPathCount} path line${pathIntent.parsedPathCount === 1 ? "" : "s"} from ${pathIntent.lineCount} line${pathIntent.lineCount === 1 ? "" : "s"}. Use one absolute path per line, e.g. /Role Map/Top Level/CEO/Andrew Sharpe.`,
                "warn"
              );
              return;
            }
          }
          if (queued !== 0) return;
          if (state.selectedId) addChildItems();
          else rememberNow();
        });
        el.draft.addEventListener("focus", () => showDraftHintToast());
        el.draft.addEventListener("input", () => {
          const hasPendingImport = !!(state.pendingPathImport && Number(state.pendingPathImport.pathCount || 0) > 0);
          const hasDraftText = !!cleanText(el.draft.value, 2000);
          if (hasPendingImport && hasDraftText) {
            state.pendingPathImport = null;
            refreshMeta();
            persistPipSnapshot();
          }
          showDraftHintToast();
        });
        el.draft.addEventListener("blur", () => {
          if (Date.now() < statusToastActiveUntil) return;
          if (!el.titleToast) return;
          el.titleToast.classList.remove("show");
        });
      }

      state.paneOrder = loadPaneOrder();
      const bootSnapshot = readLastSaveSnapshot();
      state.hasSaveSnapshot = !!bootSnapshot;
      state.lastSaveSnapshotAt = bootSnapshot ? cleanText(bootSnapshot.capturedAt, 40) : "";
      bind();
      applyPaneOrder();
      refreshMeta();
      renderTree();
      if (!restoreFromPipSnapshot()) {
        void autoLoadAtStartup();
      }
    })();
  </script>
</body>
</html>
