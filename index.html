<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pocket Lite (Work Bridge)</title>
  <style>
    :root {
      --bg-rgb: 249, 250, 248;
      --bg-alpha: 0.98;
      --panel-rgb: 255, 255, 255;
      --panel-alpha: 0.97;
      --shell-border: rgba(51, 61, 76, 0.18);
      --tree-panel-border: rgba(119, 127, 140, 0.17);
      --line: rgba(119, 127, 140, 0.17);
      --tree-panel-lift: 0 4px 10px -12px rgba(28, 36, 48, 0.06);
      --tree-panel-surface: rgba(255, 255, 255, 0.98);
      --text: rgba(20, 25, 30, 0.95);
      --muted: rgba(62, 71, 83, 0.74);
      --chip: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.04));
      --chip-border: rgba(148, 163, 184, 0.28);
      --chip-on: rgba(37, 99, 235, 0.10);
      --chip-on-border: rgba(37, 99, 235, 0.30);
      --row: rgba(86, 96, 110, 0.07);
      --row-hover: rgba(86, 96, 110, 0.12);
      --row-on: rgba(37, 99, 235, 0.10);
      --ok: #11663f;
      --warn: #8a5d08;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: transparent;
      overflow: hidden;
    }
    .app {
      margin: 8px;
      height: calc(100vh - 16px);
      border-radius: var(--radius);
      border: 1px solid var(--shell-border);
      box-shadow: 0 10px 20px -14px rgba(28, 36, 48, 0.13), 0 0 0 1px var(--shell-border), inset 0 -1px 0 var(--shell-border);
      background: rgba(var(--bg-rgb), var(--bg-alpha));
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }
    .topbar {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      padding: 3px 8px;
      border-bottom: 1px solid var(--tree-panel-border);
      background: transparent;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    .topbar::-webkit-scrollbar {
      display: none;
    }
    .title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.16px;
      color: var(--muted);
      margin-right: 6px;
      white-space: nowrap;
    }
    .chip {
      border: 1px solid var(--chip-border);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      height: 28px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .chip.primaryChip { display: none; }
    .chip.utilityChip { display: inline-flex; }
    body.pipMode .chip.primaryChip { display: inline-flex; }
    body.pipMode .chip.utilityChip { display: none; }
    body:not(.pipMode) .chip.primaryChip { display: none; }
    body:not(.pipMode) .chip.utilityChip { display: inline-flex; }
    body:not(.pipMode) #btnMovePrimary { display: inline-flex; }
    /* Lean toolbar for pocket-lite workflow: keep Save, Move, Rename, Open, PiP. */
    .topbar #btnUnfoldAll,
    .topbar #btnPaneOrder,
    .topbar #btnAddPrimary,
    .topbar #btnDeletePrimary,
    .topbar #btnOpenPrimary,
    .topbar #btnImportNow,
    .topbar #btnCancelImport,
    .topbar #btnUndoImport,
    .topbar #btnCopyTemplates,
    .topbar #btnRememberNow,
    .topbar #btnExportChanges {
      display: none !important;
    }
    .topbar #btnExportTree,
    .topbar #btnMovePrimary,
    .topbar #btnRenamePrimary,
    .topbar #btnLoad {
      display: inline-flex !important;
    }
    body:not(.pipMode) .topbar #btnPip {
      display: inline-flex !important;
    }
    .chip:hover {
      background: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.10));
      border-color: rgba(116, 124, 136, 0.26);
    }
    .chip:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .chip.on {
      background: var(--chip-on);
      border-color: var(--chip-on-border);
      color: rgba(29, 78, 216, 0.88);
    }
    .grow { flex: 1 1 20px; min-width: 20px; }
    .topStatusLane {
      flex: 0 1 340px;
      min-width: 160px;
      display: flex;
      justify-content: flex-end;
      pointer-events: auto;
    }
    .topStatusToast {
      max-width: 100%;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--chip-border);
      border-radius: 999px;
      padding: 0 12px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.05));
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translateY(-2px);
      transition: opacity 140ms ease, transform 140ms ease;
    }
    .topStatusToast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .topStatusToast.action {
      pointer-events: auto;
      cursor: pointer;
    }
    .topStatusToast.action:hover {
      border-color: rgba(37, 99, 235, 0.30);
      background: rgba(37, 99, 235, 0.08);
      color: rgba(29, 78, 216, 0.88);
    }
    .topStatusToast.ok {
      color: var(--ok);
      border-color: rgba(17, 102, 63, 0.24);
      background: rgba(17, 102, 63, 0.06);
    }
    .topStatusToast.warn {
      color: var(--warn);
      border-color: rgba(138, 93, 8, 0.24);
      background: rgba(138, 93, 8, 0.08);
    }
    .search {
      width: clamp(150px, 26vw, 300px);
      min-width: 150px;
      border: 1px solid var(--chip-border);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      background: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.06));
      color: var(--text);
    }
    .topbarSearch {
      flex: 0 0 112px;
      width: min(112px, 14vw);
      min-width: 56px;
      max-width: 112px;
      box-sizing: border-box;
      height: 26px;
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 0 4px;
      color: var(--muted);
      opacity: 0.62;
      border-radius: 6px;
    }
    .topbarSearch::placeholder {
      color: transparent;
    }
    .topbarSearch:focus {
      outline: none;
      background: rgba(var(--panel-rgb), 0.40);
      border-radius: 6px;
      padding: 4px 8px;
      color: var(--text);
      opacity: 1;
    }
    .topbarSearch:focus::placeholder {
      color: var(--muted);
    }
    .topbarSearch:not(:focus):not(:placeholder-shown) {
      color: var(--text);
      opacity: 0.86;
    }
    .layout {
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      align-items: stretch;
      min-height: 0;
      flex: 1;
      padding: 10px;
    }
    .panel {
      border: 1px solid var(--tree-panel-border);
      border-radius: 14px;
      background: var(--tree-panel-surface);
      box-shadow: var(--tree-panel-lift);
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .filterPanel, .treePanel, .changePanel { grid-column: 1; }
    .filterPanel { display: none; }
    .layout[data-pane-order="tree_entry"] .treePanel { order: 1; }
    .layout[data-pane-order="tree_entry"] .changePanel { order: 2; }
    .layout[data-pane-order="entry_tree"] .changePanel { order: 1; }
    .layout[data-pane-order="entry_tree"] .treePanel { order: 2; }
    .changePanel { display: none; }
    .filterPanel .panelBody {
      display: block;
      padding: 8px 10px;
    }
    .filterPanel .search {
      width: 100%;
      min-width: 0;
    }
    .changePanel textarea {
      min-height: 140px;
    }
    .panelHead {
      padding: 8px 10px;
      border-bottom: 1px solid var(--tree-panel-border);
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12px;
    }
    .panelHead.treeHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .focusMeta {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .focusPath {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 440px;
    }
    .chip.mini {
      font-size: 12px;
      padding: 5px 10px;
    }
    .panelBody {
      padding: 10px;
      display: grid;
      gap: 10px;
      min-height: 0;
    }
    .meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
    }
    textarea {
      width: 100%;
      min-height: 240px;
      resize: none;
      border: 1px solid var(--tree-panel-border);
      border-radius: 14px;
      padding: 12px;
      font: inherit;
      color: var(--text);
      background: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.02));
    }
    .btnRow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .status {
      font-size: 13px;
      border: 1px solid var(--tree-panel-border);
      border-radius: 12px;
      padding: 8px 10px;
      background: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.03));
      color: var(--muted);
      min-height: 38px;
      display: flex;
      align-items: center;
    }
    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }
    .detailOverlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(17, 24, 39, 0.18);
      backdrop-filter: blur(2px);
    }
    .detailOverlay[hidden] {
      display: none;
    }
    .detailCard {
      width: min(760px, 100%);
      max-height: calc(100vh - 80px);
      border: 1px solid var(--tree-panel-border);
      border-radius: 14px;
      background: rgba(var(--panel-rgb), 0.99);
      box-shadow: 0 14px 32px -20px rgba(17, 24, 39, 0.42);
      padding: 12px;
      display: grid;
      gap: 10px;
      overflow: hidden;
    }
    .detailTitle {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .detailPath {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .detailLabelInput {
      width: 100%;
      border: 1px solid var(--tree-panel-border);
      border-radius: 12px;
      padding: 9px 10px;
      font-size: 15px;
      color: var(--text);
      background: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.04));
      outline: none;
    }
    .detailBodyInput {
      width: 100%;
      min-height: 190px;
      border: 1px solid var(--tree-panel-border);
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      font-size: 14px;
      line-height: 1.42;
      color: var(--text);
      background: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.04));
      resize: vertical;
      outline: none;
    }
    .detailBtnRow {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .treeWrap {
      overflow: auto;
      padding: 14px 12px;
      min-height: 0;
      flex: 1;
    }
    .treeRoot {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .treeNode {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .row {
      position: relative;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: 10px;
      min-height: 42px;
      padding: 6px 10px;
      margin: 3px 0;
      cursor: pointer;
      background: transparent;
      outline: none;
      transition: background-color 140ms ease, border-color 140ms ease;
    }
    .row:hover { background: rgba(108, 116, 126, 0.045); }
    .row.selected {
      background: rgba(108, 116, 126, 0.07);
      border-color: rgba(108, 116, 126, 0.17);
    }
    .row.importFlash {
      background: rgba(37, 99, 235, 0.14);
      border-color: rgba(37, 99, 235, 0.34);
      animation: importFlashPulse 1.15s ease;
    }
    .row.copyFlash {
      background: rgba(37, 99, 235, 0.12);
      border-color: rgba(37, 99, 235, 0.30);
      transition: background-color 120ms ease, border-color 120ms ease;
    }
    @keyframes importFlashPulse {
      0% {
        background: rgba(37, 99, 235, 0.2);
        border-color: rgba(37, 99, 235, 0.42);
      }
      100% {
        background: rgba(37, 99, 235, 0.14);
        border-color: rgba(37, 99, 235, 0.34);
      }
    }
    .twisty {
      width: 18px;
      text-align: center;
      color: #4b5563;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
      font-size: 13px;
      line-height: 1;
      -webkit-user-select: none;
      user-select: none;
    }
    .twisty.empty { visibility: hidden; }
    .label {
      grid-column: 2;
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14.5px;
      font-weight: 500;
      line-height: 1.35;
      -webkit-user-select: none;
      user-select: none;
    }
    .detailBadge {
      grid-column: 3;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 6px;
      min-height: 18px;
      line-height: 16px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(108, 116, 126, 0.06);
      -webkit-user-select: none;
      user-select: none;
    }
    .labelEdit {
      grid-column: 2;
      min-width: 0;
      flex: 1 1 auto;
      width: 100%;
      border: 1px solid var(--chip-on-border);
      border-radius: 8px;
      padding: 5px 8px;
      font: inherit;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      outline: none;
    }
    .rowActions {
      grid-column: 4;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease 0.1s;
    }
    .row:hover .rowActions {
      opacity: 0.42;
      pointer-events: auto;
    }
    .rowActionBtn {
      width: 24px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      font-size: 16px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .rowActionBtn:hover {
      background: var(--row);
    }
    .rowActionBtn.delete:hover {
      background: #fff1f2;
      border-color: #f0bcc5;
      color: #b42318;
    }
    .children {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .treeEmptyHint {
      margin: 8px 0;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08px;
      user-select: none;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 1080px) {
      .topStatusLane { display: none; }
    }
    .treePanel .treeWrap {
      min-height: 0;
    }
    body.pipMode .layout {
      grid-template-columns: 1fr;
      min-height: calc(100vh - 86px);
    }
    body.pipMode .changePanel {
      display: none;
    }
    body.pipMode #btnPip {
      display: none;
    }
    body.pipMode .grow,
    body.pipMode .topStatusLane {
      display: none;
    }
    .mobileAddFab {
      position: absolute;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--chip-on-border);
      background: rgba(37, 99, 235, 0.12);
      color: rgba(29, 78, 216, 0.92);
      font-size: 24px;
      line-height: 1;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 8px 18px -12px rgba(15, 23, 42, 0.55);
      z-index: 30;
    }
    .mobileAddFab:hover {
      background: rgba(37, 99, 235, 0.18);
      border-color: rgba(37, 99, 235, 0.40);
    }
    .mobileAddFab:active {
      transform: translateY(1px);
    }
    .mobileAddFab:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .mobileMovePad {
      position: absolute;
      left: 50%;
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      display: none;
      width: 130px;
      height: 130px;
      z-index: 31;
      pointer-events: none;
    }
    .mobileMoveBtn {
      position: absolute;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--chip-border);
      background: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.07));
      color: var(--text);
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      pointer-events: auto;
      box-shadow: 0 6px 16px -12px rgba(15, 23, 42, 0.50);
    }
    .mobileMoveBtn:hover {
      background: rgba(var(--panel-rgb), calc(var(--panel-alpha) + 0.12));
      border-color: rgba(116, 124, 136, 0.30);
    }
    .mobileMoveBtn:active {
      transform: translateY(1px);
    }
    .mobileMoveBtn:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .mobileMoveBtn.up { top: 0; left: 44px; }
    .mobileMoveBtn.down { bottom: 0; left: 44px; }
    .mobileMoveBtn.left { top: 44px; left: 0; }
    .mobileMoveBtn.right { top: 44px; right: 0; }
    @media (max-width: 860px), (pointer: coarse) {
      body:not(.pipMode) .mobileAddFab {
        display: inline-flex;
      }
      body:not(.pipMode).moveModeActive .mobileMovePad {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Your Pocket</div>
      <input id="search" class="search topbarSearch" placeholder="Filter">
      <button id="btnLoad" class="chip utilityChip">Open</button>
      <button id="btnExportTree" class="chip utilityChip" disabled>Save</button>
      <button id="btnUnfoldAll" class="chip primaryChip" disabled>Unfold</button>
      <button id="btnPaneOrder" class="chip utilityChip">Layout</button>
      <button id="btnAddPrimary" class="chip primaryChip" disabled>Add</button>
      <button id="btnMovePrimary" class="chip primaryChip" disabled>Move</button>
      <button id="btnRenamePrimary" class="chip primaryChip" disabled>Rename</button>
      <button id="btnDeletePrimary" class="chip primaryChip" disabled>Delete</button>
      <button id="btnOpenPrimary" class="chip primaryChip" disabled>Open</button>
      <button id="btnImportNow" class="chip utilityChip" disabled>Import now</button>
      <button id="btnCancelImport" class="chip utilityChip" disabled>Cancel import</button>
      <button id="btnUndoImport" class="chip utilityChip" disabled>Undo import</button>
      <button id="btnCopyTemplates" class="chip utilityChip" disabled>Copy templates</button>
      <button id="btnRememberNow" class="chip utilityChip" disabled>Remember now</button>
      <button id="btnPip" class="chip utilityChip">Pop-out</button>
      <button id="btnExportChanges" class="chip utilityChip" disabled>Save changes bundle</button>
      <input id="fileInput" type="file" accept=".json,.txt,.md" hidden>
      <div class="grow"></div>
      <div class="topStatusLane">
        <div id="titleToast" class="topStatusToast" aria-live="polite"></div>
      </div>
    </div>

    <div class="layout">
      <section class="panel filterPanel">
        <div class="panelHead">Filter</div>
        <div class="panelBody">
          <input class="search" placeholder="Filter tree (hides unmatched branches)">
        </div>
      </section>

      <section class="panel treePanel">
        <div class="panelHead treeHead">
          <span>Your Pocket</span>
          <div class="focusMeta">
            <span id="focusPath" class="focusPath">Focus: all</span>
          </div>
        </div>
        <div id="treeWrap" class="treeWrap" tabindex="0">
          <ul id="treeRoot" class="treeRoot"></ul>
        </div>
      </section>

      <section class="panel changePanel">
        <div class="panelHead">Remember</div>
        <div class="panelBody">
          <div id="sourceMeta" class="meta">No file loaded yet.</div>
          <div id="selectedMeta" class="meta">Selected: none</div>
          <textarea id="draft" placeholder="Type text here. One line = one item."></textarea>
          <div class="btnRow">
            <button id="btnAddChild" class="chip" disabled>Add child</button>
            <button id="btnRename" class="chip" disabled>Rename</button>
            <button id="btnDelete" class="chip" disabled>Delete</button>
            <button id="btnMoveMode" class="chip" disabled>Move mode</button>
          </div>
          <div id="status" class="status">Load a tree file to begin.</div>
          <div id="opsMeta" class="hint">Changes recorded: 0</div>
        </div>
      </section>
    </div>

    <button id="btnAddMobile" class="mobileAddFab" type="button" aria-label="Add item" title="Add item">+</button>
    <div id="mobileMovePad" class="mobileMovePad" aria-hidden="true">
      <button id="btnMovePadUp" class="mobileMoveBtn up" type="button" aria-label="Move up" title="Move up">&#8593;</button>
      <button id="btnMovePadDown" class="mobileMoveBtn down" type="button" aria-label="Move down" title="Move down">&#8595;</button>
      <button id="btnMovePadLeft" class="mobileMoveBtn left" type="button" aria-label="Outdent" title="Outdent">&#8592;</button>

      function normalisePaneOrder(value) {
        const key = cleanText(value, 40).toLowerCase();
        const mapped = LEGACY_PANE_ORDER_MAP[key] || key;
        return PANE_ORDER_OPTIONS.includes(mapped) ? mapped : PANE_ORDER_OPTIONS[0];
      }

      function loadPaneOrder() {
        try {
          return normalisePaneOrder(localStorage.getItem(PANE_ORDER_KEY) || "");
        } catch {
          return PANE_ORDER_OPTIONS[0];
        }
      }

      function savePaneOrder(value) {
        try {
          localStorage.setItem(PANE_ORDER_KEY, normalisePaneOrder(value));
        } catch {}
      }

      function applyPaneOrder() {
        const paneOrder = normalisePaneOrder(state.paneOrder);
        state.paneOrder = paneOrder;
        if (el.layout instanceof HTMLElement) {
          el.layout.setAttribute("data-pane-order", paneOrder);
        }
        if (el.btnPaneOrder instanceof HTMLButtonElement) {
          const label = PANE_ORDER_LABELS[paneOrder] || PANE_ORDER_LABELS[PANE_ORDER_OPTIONS[0]];
          el.btnPaneOrder.textContent = "Layout";
          el.btnPaneOrder.title = `Pane order: ${label}. Click to cycle.`;
        }
      }

      function cyclePaneOrder() {
        const current = normalisePaneOrder(state.paneOrder);
        const currentIndex = Math.max(0, PANE_ORDER_OPTIONS.indexOf(current));
        const next = PANE_ORDER_OPTIONS[(currentIndex + 1) % PANE_ORDER_OPTIONS.length];
        state.paneOrder = next;
        savePaneOrder(next);
        applyPaneOrder();
        setStatus(`Layout: ${PANE_ORDER_LABELS[next] || "updated"}.`, "ok");
      }

      function nowIso() {
        return new Date().toISOString();
      }

      function cleanText(v, max = 220) {
        return String(v || "").replace(/\s+/g, " ").trim().slice(0, max);
      }

      function normaliseDetails(v, max = 4000) {
        const raw = String(v || "").replace(/\r/g, "").replace(/\t/g, "  ");
        if (!raw.trim()) return "";
        const lines = raw.split("\n").map((line) => line.replace(/[ \t]+$/g, ""));
        const collapsed = lines.join("\n").replace(/\n{3,}/g, "\n\n");
        return collapsed.trim().slice(0, max);
      }

      function normaliseIsoTimestamp(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";
        const ms = Date.parse(raw);
        if (!Number.isFinite(ms)) return "";
        return new Date(ms).toISOString();
      }

      function normaliseDateYmd(value) {
        const raw = String(value || "").trim();
        return /^\d{4}-\d{2}-\d{2}$/.test(raw) ? raw : "";
      }

      function uniqueTextArray(raw, maxItems = 200, maxLen = 80) {
        if (!Array.isArray(raw)) return [];
        const out = [];
        const seen = new Set();
        for (const item of raw) {
          const value = cleanText(item, maxLen);
          const key = value.toLowerCase();
          if (!value || seen.has(key)) continue;
          seen.add(key);
          out.push(value);
          if (out.length >= maxItems) break;
        }
        return out;
      }

      function normaliseTreeTaskMeta(value) {
        if (!value || typeof value !== "object") return null;
        const statusRaw = cleanText(value.status, 40).toLowerCase().replace(/[\s-]+/g, "_");
        const status = ["open", "in_progress", "blocked", "done"].includes(statusRaw) ? statusRaw : "";
        const priorityRaw = cleanText(value.priority, 24).toLowerCase();
        const priority = ["low", "normal", "high", "urgent"].includes(priorityRaw) ? priorityRaw : "";
        const due = normaliseDateYmd(value.due);
        const followUpBy = normaliseDateYmd(value.followUpBy || value.follow_up_by);
        const waitingFor = cleanText(value.waitingFor || value.waiting_for || value.owner, 120);
        const contactTypeRaw = cleanText(value.contactType || value.contact_type, 40).toLowerCase();
        const contactType = ["email", "phone", "sms", "teams", "in_person", "other"].includes(contactTypeRaw) ? contactTypeRaw : "";
        const projectPath = cleanText(value.projectPath || value.project || value.path, 320);
        const notes = normaliseDetails(value.notes, 2400);
        const createdAt = normaliseIsoTimestamp(value.createdAt);
        const updatedAt = normaliseIsoTimestamp(value.updatedAt);
        const tags = uniqueTextArray(value.tags, 80, 40);
        const done = typeof value.done === "boolean" ? value.done : null;

        const out = {};
        if (status) out.status = status;
        if (priority) out.priority = priority;
        if (due) out.due = due;
        if (followUpBy) out.followUpBy = followUpBy;
        if (waitingFor) out.waitingFor = waitingFor;
        if (contactType) out.contactType = contactType;
        if (projectPath) out.projectPath = projectPath;
        if (notes) out.notes = notes;
        if (createdAt) out.createdAt = createdAt;
        if (updatedAt) out.updatedAt = updatedAt;
        if (tags.length > 0) out.tags = tags;
        if (done !== null) out.done = done;

        return Object.keys(out).length > 0 ? out : null;
      }

      function normaliseTreeProfile(value) {
        if (!value || typeof value !== "object") return null;
        const keywords = uniqueTextArray(value.keywords, 240, 80);
        const entities = uniqueTextArray(value.entities, 240, 80);
        const people = uniqueTextArray(value.people, 240, 120);
        const usageCountRaw = Number(value.usageCount);
        const usageCount = Number.isFinite(usageCountRaw) ? Math.max(0, Math.round(usageCountRaw)) : 0;
        const lastUsed = normaliseIsoTimestamp(value.lastUsed);
        const createdAt = normaliseIsoTimestamp(value.createdAt);
        const updatedAt = normaliseIsoTimestamp(value.updatedAt);

        const corrections = {};
        if (value.corrections && typeof value.corrections === "object" && !Array.isArray(value.corrections)) {
          const entries = Object.entries(value.corrections);
          for (let i = 0; i < entries.length; i += 1) {
            const [rawKey, rawRule] = entries[i];
            if (i >= 500) break;
            const key = cleanText(rawKey, 80).toLowerCase();
            if (!key || !rawRule || typeof rawRule !== "object") continue;
            const preferredNodePath = cleanText(rawRule.preferredNodePath, 320);
            const avoidNodePath = cleanText(rawRule.avoidNodePath, 320);
            if (!preferredNodePath && !avoidNodePath) continue;
            corrections[key] = {};
            if (preferredNodePath) corrections[key].preferredNodePath = preferredNodePath;
            if (avoidNodePath) corrections[key].avoidNodePath = avoidNodePath;
          }
        }

        const out = {};
        if (keywords.length > 0) out.keywords = keywords;
        if (entities.length > 0) out.entities = entities;
        if (people.length > 0) out.people = people;
        if (usageCount > 0) out.usageCount = usageCount;
        if (lastUsed) out.lastUsed = lastUsed;
        if (createdAt) out.createdAt = createdAt;
        if (updatedAt) out.updatedAt = updatedAt;
        if (Object.keys(corrections).length > 0) out.corrections = corrections;

        return Object.keys(out).length > 0 ? out : null;
      }

      const RESERVED_NODE_KEYS = new Set([
        "id",
        "parentId",
        "label",
        "order",
        "updatedAt",
        "source",
        "details",
        "task",
        "taskMeta",
        "profile",
      ]);

      const RESERVED_ROOT_KEYS = new Set([
        "schema",
        "exportedAt",
        "writtenAt",
        "cachedAt",
        "mainThoughtTree",
        "mainThoughtTreeTombstones",
        "data",
        "snapshot",
        "source",
        "summary",
        "operations",
      ]);

      function safeJsonClone(value, maxChars = 8000) {
        try {
          const text = JSON.stringify(value);
          if (!text || text.length > maxChars) return null;
          return JSON.parse(text);
        } catch {
          return null;
        }
      }

      function normaliseNodeExtras(item) {
        if (!item || typeof item !== "object" || Array.isArray(item)) return null;
        const out = {};
        let kept = 0;
        for (const [rawKey, rawValue] of Object.entries(item)) {
          if (kept >= 24) break;
          const key = cleanText(rawKey, 48);
          if (!key || RESERVED_NODE_KEYS.has(key)) continue;
          if (!/^[a-zA-Z0-9_.:-]+$/.test(key)) continue;

          if (typeof rawValue === "string") {
            out[key] = rawValue.slice(0, 1200);
            kept += 1;
            continue;
          }
          if (typeof rawValue === "number") {
            if (!Number.isFinite(rawValue)) continue;
            out[key] = rawValue;
            kept += 1;
            continue;
          }
          if (typeof rawValue === "boolean" || rawValue === null) {
            out[key] = rawValue;
            kept += 1;
            continue;
          }

          const cloned = safeJsonClone(rawValue, 8000);
          if (cloned === null) continue;
          out[key] = cloned;
          kept += 1;
        }
        return kept > 0 ? out : null;
      }

      function normaliseRootExtras(item) {
        if (!item || typeof item !== "object" || Array.isArray(item)) return null;
        const out = {};
        let kept = 0;
        for (const [rawKey, rawValue] of Object.entries(item)) {
          if (kept >= 32) break;
          const key = cleanText(rawKey, 64);
          if (!key || RESERVED_ROOT_KEYS.has(key)) continue;
          if (!/^[a-zA-Z0-9_.:-]+$/.test(key)) continue;

          if (typeof rawValue === "string") {
            out[key] = rawValue.slice(0, 2000);
            kept += 1;
            continue;
          }
          if (typeof rawValue === "number") {
            if (!Number.isFinite(rawValue)) continue;
            out[key] = rawValue;
            kept += 1;
            continue;
          }
          if (typeof rawValue === "boolean" || rawValue === null) {
            out[key] = rawValue;
            kept += 1;
            continue;
          }

          const cloned = safeJsonClone(rawValue, 12000);
          if (cloned === null) continue;
          out[key] = cloned;
          kept += 1;
        }
        return kept > 0 ? out : null;
      }

      function makeId(prefix = "pl") {
        return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 9)}`;
      }

      function applyLoadedState(norm, sourceInfo = {}, options = {}) {
        const clearOps = options.clearOps !== false;
        state.nodes = Array.isArray(norm.nodes) ? norm.nodes : [];
        state.tombstones = Array.isArray(norm.tombstones) ? norm.tombstones : [];
        state.rootExtras = (norm.rootExtras && typeof norm.rootExtras === "object" && !Array.isArray(norm.rootExtras)) ? norm.rootExtras : {};
        state.dataExtras = (norm.dataExtras && typeof norm.dataExtras === "object" && !Array.isArray(norm.dataExtras)) ? norm.dataExtras : {};
        if (clearOps) state.ops = [];
        collapseAllNodes();
        state.selectedId = "";
        state.focusRootId = "";
        state.pendingPathImport = null;
        state.lastImportBatch = null;
        state.source = {
          schema: cleanText(sourceInfo.schema || norm.schema, 80),
          fileName: cleanText(sourceInfo.fileName, 120),
          writtenAt: cleanText(sourceInfo.writtenAt || norm.writtenAt, 40),
          loadedAt: nowIso(),
        };
        const baselinePayload = {
          ...(state.rootExtras || {}),
          schema: "portal.export.v1",
          exportedAt: nowIso(),
          writtenAt: nowIso(),
          mainThoughtTree: state.nodes,
          mainThoughtTreeTombstones: state.tombstones,
          data: {
            ...(state.dataExtras || {}),
            mainThoughtTree: state.nodes,
            mainThoughtTreeTombstones: state.tombstones,
          },
        };
        saveLastSaveSnapshot(baselinePayload);
        refreshMeta();
        renderTree();
        persistPipSnapshot();
      }

      function saveAutoCache(norm, sourceInfo = {}) {
        try {
          const payload = {
            ...(state.rootExtras || {}),
            cachedAt: nowIso(),
            source: {
              schema: cleanText(sourceInfo.schema || norm.schema, 80),
              fileName: cleanText(sourceInfo.fileName, 120),
              writtenAt: cleanText(sourceInfo.writtenAt || norm.writtenAt, 40),
            },
            data: {
              ...(state.dataExtras || {}),
              mainThoughtTree: Array.isArray(norm.nodes) ? norm.nodes : [],

            },

          localStorage.setItem(AUTO_CACHE_KEY, JSON.stringify(payload));
        } catch {}
      }

      function readLastSaveSnapshot() {
        try {
          const raw = localStorage.getItem(LAST_SAVE_SNAPSHOT_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return null;
          const payload = parsed.payload && typeof parsed.payload === "object" ? parsed.payload : null;
          if (!payload) return null;
          return {
            capturedAt: cleanText(parsed.capturedAt, 40),
            source: parsed.source && typeof parsed.source === "object" ? parsed.source : {},
            payload,
          };
        } catch {
          return null;
        }
      }

      function saveLastSaveSnapshot(payload) {
        if (!payload || typeof payload !== "object") return false;
        const clone = safeJsonClone(payload, 5000000);
        if (!clone) return false;
        try {
          const entry = {
            schema: "pocket.save.snapshot.v1",
            capturedAt: nowIso(),
            source: {
              schema: cleanText(state.source?.schema, 80),
              fileName: cleanText(state.source?.fileName, 120),
              writtenAt: cleanText(state.source?.writtenAt, 40),
            },
            payload: clone,
          };
          localStorage.setItem(LAST_SAVE_SNAPSHOT_KEY, JSON.stringify(entry));
          state.hasSaveSnapshot = true;
          state.lastSaveSnapshotAt = cleanText(entry.capturedAt, 40);
          return true;
        } catch {
          return false;
        }
      }

      function restoreLastSaveSnapshot() {
        const snapshot = readLastSaveSnapshot();
        if (!snapshot || !snapshot.payload) {
          setStatus("No saved snapshot yet.", "warn");
          return false;
        }
        const unsavedCount = Array.isArray(state.ops) ? state.ops.length : 0;
        if (unsavedCount > 0) {
          const ok = window.confirm(
            `Restore last snapshot and discard ${unsavedCount} unsaved change${unsavedCount === 1 ? "" : "s"}?`
          );
          if (!ok) {
            setStatus("Restore cancelled.", "warn");
            return false;
          }
        }
        const norm = normaliseInput(snapshot.payload);
        if (!Array.isArray(norm.nodes)) {
          setStatus("Snapshot could not be restored.", "warn");
          return false;
        }
        applyLoadedState(norm, {
          schema: cleanText(snapshot?.source?.schema, 80) || norm.schema || "portal.export.v1",
          fileName: "Last save snapshot",
          writtenAt: cleanText(snapshot.capturedAt, 40) || cleanText(norm.writtenAt, 40),
        });
        recordOp({
          type: "restore_last_snapshot",
          snapshotAt: cleanText(snapshot.capturedAt, 40),
        });
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus("Restored last snapshot.", "ok");
        flashSaveChip("Restored");
        return true;
      }

      function snapshotCurrentTreeForRestore() {
        if (!Array.isArray(state.nodes) || state.nodes.length === 0) return false;
        const payload = {
          ...(state.rootExtras || {}),
          schema: "portal.export.v1",
          exportedAt: nowIso(),
          writtenAt: nowIso(),
          mainThoughtTree: state.nodes,
          mainThoughtTreeTombstones: state.tombstones,
          data: {
            ...(state.dataExtras || {}),
            mainThoughtTree: state.nodes,
            mainThoughtTreeTombstones: state.tombstones,
          },
        };
        const ok = saveLastSaveSnapshot(payload);
        if (ok && el.btnRestoreLast) el.btnRestoreLast.disabled = !state.hasSaveSnapshot;
        return ok;
      }

      function restoreAutoCache() {
        try {
          const raw = localStorage.getItem(AUTO_CACHE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return null;
          const norm = normaliseInput({
            ...parsed,
            schema: "portal.mtt.web.v1",
            writtenAt: parsed?.source?.writtenAt || "",
            data: parsed.data && typeof parsed.data === "object" ? parsed.data : {},
          });
          if (!Array.isArray(norm.nodes) || norm.nodes.length === 0) return null;
          return {
            norm,
            source: {
              schema: cleanText(parsed?.source?.schema, 80) || "portal.mtt.web.v1",
              fileName: cleanText(parsed?.source?.fileName, 120) || `${AUTO_SOURCE_DEFAULT} (cached)`,
              writtenAt: cleanText(parsed?.source?.writtenAt, 40),
            },
          };
        } catch {
          return null;
        }
      }

      async function readSourceText(sourcePath) {
        const direct = cleanText(sourcePath, 320);
        const absolute = (() => {
          try {
            return new URL(direct, window.location.href).toString();
          } catch {
            return "";
          }
        })();
        const candidates = [direct, absolute].filter(Boolean);
        let lastErr = null;

        for (const candidate of candidates) {
          try {
            const resp = await fetch(candidate, { cache: "no-store" });
            if (resp && resp.ok) {
              return await resp.text();
            }
          } catch (err) {
            lastErr = err;
          }
        }

        for (const candidate of candidates) {
          try {
            const text = await new Promise((resolve, reject) => {
              const xhr = new XMLHttpRequest();
              xhr.open("GET", candidate, true);
              xhr.responseType = "text";
              xhr.onload = () => {
                const status = Number(xhr.status || 0);
                if ((status >= 200 && status < 300) || status === 0) {
                  resolve(String(xhr.responseText || ""));
                } else {
                  reject(new Error(`XHR status ${status}`));
                }
              };
              xhr.onerror = () => reject(new Error("XHR error"));
              xhr.onabort = () => reject(new Error("XHR aborted"));
              xhr.send();
            });
            if (text && String(text).trim()) return String(text);
          } catch (err) {
            lastErr = err;
          }
        }

        throw lastErr || new Error("Could not read source");
      }

      function parseNdjsonLines(rawText, maxLines = 5000) {
        const text = String(rawText || "");
        if (!text.trim()) return [];
        const lines = text
          .split(/\r?\n/)
          .map((line) => String(line || "").trim())
          .filter(Boolean);
        const out = [];
        for (let i = 0; i < lines.length; i += 1) {
          if (out.length >= maxLines) break;
          try {
            const parsed = JSON.parse(lines[i]);
            if (parsed && typeof parsed === "object") out.push(parsed);
          } catch {}
        }
        return out;
      }

      function extractNormFromChangeEntry(entry) {
        if (!entry || typeof entry !== "object") return null;
        const candidates = [];
        if (entry.snapshot && typeof entry.snapshot === "object") {
          candidates.push(entry.snapshot);
        }
        if (entry.data && typeof entry.data === "object") {
          candidates.push({
            schema: "portal.mtt.web.v1",
            writtenAt: cleanText(entry.writtenAt || entry.exportedAt, 40),
            data: entry.data,
          });
        }
        candidates.push(entry);

        for (const candidate of candidates) {
          const norm = normaliseInput(candidate);
          if (!Array.isArray(norm.nodes) || norm.nodes.length === 0) continue;
          const writtenAt = cleanText(
            entry.writtenAt || entry.exportedAt || norm.writtenAt,
            40
          );
          const ms = Number.isFinite(Date.parse(writtenAt)) ? Date.parse(writtenAt) : 0;
          return { norm, writtenAt, ms };
        }
        return null;
      }

      function pickLatestChangeSnapshot(entries) {
        const safe = Array.isArray(entries) ? entries : [];
        let best = null;
        for (let i = 0; i < safe.length; i += 1) {
          const extracted = extractNormFromChangeEntry(safe[i]);
          if (!extracted) continue;
          if (!best) {
            best = { ...extracted, index: i };
            continue;
          }
          if (extracted.ms > best.ms || (extracted.ms === best.ms && i > best.index)) {
            best = { ...extracted, index: i };
          }
        }
        return best;
      }

      async function loadLatestSnapshotFromChangeLog() {
        for (const sourcePath of CHANGE_LOG_FALLBACKS) {
          try {
            const text = await readSourceText(sourcePath);
            const entries = parseNdjsonLines(text);
            if (!entries.length) continue;
            const latest = pickLatestChangeSnapshot(entries);
            if (!latest) continue;
            return {
              ok: true,
              sourcePath,
              entryCount: entries.length,
              norm: latest.norm,
              writtenAt: latest.writtenAt,
              ms: latest.ms,
            };
          } catch {}
        }
        return { ok: false };
      }

      async function autoLoadAtStartup() {
        if (isPipMode) return false;
        if (state.nodes.length > 0) return true;
        const sourceParam = cleanText(url.searchParams.get("source"), 260);
        const sourcePaths = sourceParam ? [sourceParam] : AUTO_SOURCE_FALLBACKS;

        for (const sourcePath of sourcePaths) {
          try {
            const text = await readSourceText(sourcePath);
            const parsed = JSON.parse(text);
            const norm = normaliseInput(parsed);
            if (Array.isArray(norm.nodes) && norm.nodes.length > 0) {
              applyLoadedState(norm, {
                schema: norm.schema,
                fileName: sourcePath,
                writtenAt: norm.writtenAt,
              });
              const baseWrittenAt = cleanText(norm.writtenAt, 40);
              const baseMs = Number.isFinite(Date.parse(baseWrittenAt)) ? Date.parse(baseWrittenAt) : 0;
              const overlay = await loadLatestSnapshotFromChangeLog();
              if (overlay.ok) {
                const shouldApplyOverlay = !(baseMs > 0 && overlay.ms > 0 && overlay.ms <= baseMs);
                if (shouldApplyOverlay) {
                  applyLoadedState(overlay.norm, {
                    schema: overlay.norm.schema,
                    fileName: `${sourcePath} + ${overlay.sourcePath}`,
                    writtenAt: overlay.writtenAt || overlay.norm.writtenAt,
                  });
                  saveAutoCache(overlay.norm, {
                    schema: overlay.norm.schema,
                    fileName: `${sourcePath} + ${overlay.sourcePath}`,
                    writtenAt: overlay.writtenAt || overlay.norm.writtenAt,
                  });
                  setStatus(`Auto-loaded ${overlay.norm.nodes.length} nodes (change log applied).`, "ok");
                  return true;
                }
              }
              saveAutoCache(norm, {
                schema: norm.schema,
                fileName: sourcePath,
                writtenAt: norm.writtenAt,
              });
              setStatus(`Auto-loaded ${norm.nodes.length} nodes.`, "ok");
              return true;
            }
          } catch {}
        }

        const overlayOnly = await loadLatestSnapshotFromChangeLog();
        if (overlayOnly.ok) {
          applyLoadedState(overlayOnly.norm, {
            schema: overlayOnly.norm.schema,
            fileName: overlayOnly.sourcePath,
            writtenAt: overlayOnly.writtenAt || overlayOnly.norm.writtenAt,
          });
          saveAutoCache(overlayOnly.norm, {
            schema: overlayOnly.norm.schema,
            fileName: overlayOnly.sourcePath,
            writtenAt: overlayOnly.writtenAt || overlayOnly.norm.writtenAt,
          });
          setStatus(`Loaded ${overlayOnly.norm.nodes.length} nodes from change log.`, "ok");
          return true;
        }

        const cached = restoreAutoCache();
        if (cached && cached.norm) {
          applyLoadedState(cached.norm, cached.source);
          setStatus(`Loaded cached tree (${cached.norm.nodes.length} nodes).`, "ok");
          return true;
        }
        const sourceHint = sourceParam || AUTO_SOURCE_DEFAULT;
        setStatus(`Auto-load could not read ${sourceHint}. Click "Open" once to seed cache.`, "warn");
        return false;
      }

      function persistPipSnapshot() {
        try {
          const payload = {
            savedAt: nowIso(),
            source: state.source,
            nodes: state.nodes,
            tombstones: state.tombstones,
            rootExtras: state.rootExtras || {},
            dataExtras: state.dataExtras || {},
            selectedId: state.selectedId,
            focusRootId: state.focusRootId,
            collapsedIds: Array.from(state.collapsed),
          };
          localStorage.setItem(PIP_SNAPSHOT_KEY, JSON.stringify(payload));
        } catch {}
      }

      function restoreFromPipSnapshot() {
        if (state.nodes.length > 0) return false;
        try {
          const raw = localStorage.getItem(PIP_SNAPSHOT_KEY);
          if (!raw) return false;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return false;
          const nodes = normaliseNodes(parsed.nodes);
          if (!Array.isArray(nodes) || nodes.length === 0) return false;
          state.nodes = nodes;
          state.tombstones = Array.isArray(parsed.tombstones) ? parsed.tombstones : [];
          state.rootExtras = (parsed.rootExtras && typeof parsed.rootExtras === "object" && !Array.isArray(parsed.rootExtras))
            ? normaliseRootExtras(parsed.rootExtras) || {}
            : {};
          state.dataExtras = (parsed.dataExtras && typeof parsed.dataExtras === "object" && !Array.isArray(parsed.dataExtras))
            ? normaliseRootExtras(parsed.dataExtras) || {}
            : {};
          state.ops = [];
          state.selectedId = cleanText(parsed.selectedId, 80);
          state.focusRootId = cleanText(parsed.focusRootId, 80);
          state.collapsed = new Set(Array.isArray(parsed.collapsedIds) ? parsed.collapsedIds.map((id) => cleanText(id, 80)).filter(Boolean) : []);
          if (state.collapsed.size === 0) collapseAllNodes();
          state.source = {
            schema: cleanText(parsed.source && parsed.source.schema, 80),
            fileName: cleanText(parsed.source && parsed.source.fileName, 120),
            writtenAt: cleanText(parsed.source && parsed.source.writtenAt, 40),
            loadedAt: nowIso(),
          };
          refreshMeta();
          renderTree();
          const fromLabel = isPipMode ? "current session" : "local autosave";
          setStatus(`Loaded ${state.nodes.length} node${state.nodes.length === 1 ? "" : "s"} from ${fromLabel}.`, "ok");
          return true;
        } catch {
          return false;
        }
      }

      async function copyText(text) {
        const value = cleanText(text, 220);
        if (!value) return false;
        try {
          if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
            await navigator.clipboard.writeText(value);
            return true;
          }
        } catch {}
        try {
          const ta = document.createElement("textarea");
          ta.value = value;
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const ok = document.execCommand("copy");
          ta.remove();
          return !!ok;
        } catch {
          return false;
        }
      }

      function findTreeRowByNodeId(nodeId) {
        const id = cleanText(nodeId, 80);
        if (!id || !(el.treeWrap instanceof HTMLElement)) return null;
        const rows = el.treeWrap.querySelectorAll(".row[data-node-id]");
        for (const row of rows) {
          if (!(row instanceof HTMLElement)) continue;
          const rowId = cleanText(row.getAttribute("data-node-id"), 80);
          if (rowId === id) return row;
        }
        return null;
      }

      function showRowCopyToast(nodeId) {
        const id = cleanText(nodeId, 80);
        if (!id) return false;
        const row = findTreeRowByNodeId(id);
        if (!(row instanceof HTMLElement)) return false;
        const prevTimer = rowCopyToastTimers.get(id);
        if (prevTimer) clearTimeout(prevTimer);
        row.classList.remove("copyFlash");
        void row.offsetWidth;
        row.classList.add("copyFlash");
        const timer = window.setTimeout(() => {
          row.classList.remove("copyFlash");
          rowCopyToastTimers.delete(id);
        }, 1050);
        rowCopyToastTimers.set(id, timer);
        return true;
      }

      function showCopiedFeedback(nodeId) {
        showRowCopyToast(nodeId);
        setStatus("Copied.", "ok");
      }

      function normaliseNodes(raw) {
        const arr = Array.isArray(raw) ? raw : [];
        const out = [];
        const seen = new Set();
        for (let i = 0; i < arr.length; i += 1) {
          const item = arr[i];
          if (!item || typeof item !== "object") continue;
          const id = cleanText(item.id, 80);
          if (!id || id === "root" || seen.has(id)) continue;
          seen.add(id);
          const parentId = cleanText(item.parentId, 80) || "root";
          const label = cleanText(item.label, 220);
          if (!label) continue;
          const orderRaw = Number(item.order);
          const order = Number.isFinite(orderRaw) ? Math.round(orderRaw) : (1000 + out.length);
          const updatedAt = cleanText(item.updatedAt, 40) || nowIso();
          const details = normaliseDetails(item.details, 4000);
          const task = normaliseTreeTaskMeta(item.task || item.taskMeta);
          const profile = normaliseTreeProfile(item.profile);
          const extras = normaliseNodeExtras(item);
          const payload = {
            id,
            parentId,
            label,
            order,
            updatedAt,
            source: cleanText(item.source, 30) || "manual",
          };
          if (details) payload.details = details;
          if (task) payload.task = task;
          if (profile) payload.profile = profile;
          if (extras) Object.assign(payload, extras);
          out.push(payload);
        }
        return out;
      }

      function normaliseInput(parsed) {
        const p = (parsed && typeof parsed === "object") ? parsed : {};
        const schema = cleanText(p.schema, 80);
        const rootExtras = normaliseRootExtras(p);
        if (schema === "portal.mtt.web.v1" && p.data && typeof p.data === "object") {
          const dataExtras = normaliseRootExtras(p.data);
          return {
            schema,
            writtenAt: cleanText(p.writtenAt, 40),
            nodes: normaliseNodes(p.data.mainThoughtTree),
            tombstones: Array.isArray(p.data.mainThoughtTreeTombstones) ? p.data.mainThoughtTreeTombstones : [],
            rootExtras,
            dataExtras,
          };
        }
        if (schema === "portal.sync.v1" && p.data && typeof p.data === "object") {
          const dataExtras = normaliseRootExtras(p.data);
          return {
            schema,
            writtenAt: cleanText(p.writtenAt, 40),
            nodes: normaliseNodes(p.data.mainThoughtTree),
            tombstones: Array.isArray(p.data.mainThoughtTreeTombstones) ? p.data.mainThoughtTreeTombstones : [],
            rootExtras,
            dataExtras,
          };
        }
        if (schema === "portal.pocketlite.changes.v1" && p.snapshot && typeof p.snapshot === "object") {
          const snap = p.snapshot;
          const dataObj = (snap.data && typeof snap.data === "object") ? snap.data : {};
          const dataExtras = normaliseRootExtras(dataObj);
          return {
            schema,
            writtenAt: cleanText(p.exportedAt, 40),
            nodes: normaliseNodes(dataObj.mainThoughtTree),
            tombstones: Array.isArray(dataObj.mainThoughtTreeTombstones) ? dataObj.mainThoughtTreeTombstones : [],
            rootExtras,
            dataExtras,
          };
        }
        if (Array.isArray(p.mainThoughtTree)) {
          return {
            schema: schema || "unknown.mainThoughtTree",
            writtenAt: cleanText(p.writtenAt, 40),
            nodes: normaliseNodes(p.mainThoughtTree),
            tombstones: Array.isArray(p.mainThoughtTreeTombstones) ? p.mainThoughtTreeTombstones : [],
            rootExtras,
            dataExtras: null,
          };
        }
        if (Array.isArray(parsed)) {
          return {
            schema: "array.nodes",
            writtenAt: "",
            nodes: normaliseNodes(parsed),
            tombstones: [],
            rootExtras: null,
            dataExtras: null,
          };
        }
        return { schema: "", writtenAt: "", nodes: [], tombstones: [], rootExtras: null, dataExtras: null };
      }

      function nodeMap() {
        const m = new Map();
        for (const n of state.nodes) m.set(n.id, n);
        return m;
      }

      function childrenMap() {
        const byParent = new Map();
        for (const n of state.nodes) {
          const pid = n.parentId || "root";
          if (!byParent.has(pid)) byParent.set(pid, []);
          byParent.get(pid).push(n);
        }
        for (const arr of byParent.values()) {
          arr.sort((a, b) => (a.order - b.order) || a.label.localeCompare(b.label));
        }
        return byParent;
      }

      function findChildByLabel(parentId, label) {
        const want = cleanText(label, 120).toLowerCase();
        if (!want) return null;
        const byParent = childrenMap();
        const kids = byParent.get(parentId || "root") || [];
        for (const kid of kids) {
          if (cleanText(kid.label, 220).toLowerCase() === want) return kid;
        }
        return null;
      }

      function findPathNode(labels) {
        const parts = Array.isArray(labels) ? labels.map((v) => cleanText(v, 120)).filter(Boolean) : [];
        if (parts.length === 0) return null;
        let parentId = "root";
        let found = null;
        for (const part of parts) {
          found = findChildByLabel(parentId, part);
          if (!found) return null;
          parentId = found.id;
        }
        return found;
      }

      function ensurePathNodeUnder(rootParentId, labels) {
        const parts = Array.isArray(labels) ? labels.map((v) => cleanText(v, 120)).filter(Boolean) : [];
        if (parts.length === 0) return null;
        let parentId = cleanText(rootParentId, 80) || "root";
        let current = null;
        for (const part of parts) {
          let child = findChildByLabel(parentId, part);
          if (!child) {
            const id = makeId("node");
            const order = maxSiblingOrder(parentId) + 1;
            child = {
              id,
              parentId,
              label: part,
              source: "manual",
              order,
              updatedAt: nowIso(),
            };
            state.nodes.push(child);
            recordOp({ type: "add_path", id, parentId, label: part });
          }
          current = child;
          parentId = child.id;
        }
        return current;
      }

      function ensurePathNode(labels) {
        return ensurePathNodeUnder("root", labels);
      }

      function resolveImportAnchorHeadNode() {
        const map = nodeMap();
        let cur = map.get(state.focusRootId || state.selectedId) || null;
        if (!cur) return null;
        let guard = 0;
        while (cur && cur.parentId && cur.parentId !== "root" && guard < 200) {
          cur = map.get(cur.parentId) || null;
          guard += 1;
        }
        return cur || null;
      }

      function inferAnchorHeadFromPaths(paths) {
        if (!Array.isArray(paths) || paths.length === 0) return null;
        const roots = state.nodes.filter((n) => (n.parentId || "root") === "root");
        if (roots.length === 0) return null;
        const byLabel = new Map();
        for (const root of roots) {
          const key = cleanText(root.label, 220).toLowerCase();
          if (!key) continue;
          if (!byLabel.has(key)) byLabel.set(key, root);
        }
        const matched = [];
        for (const parts of paths) {
          const first = Array.isArray(parts) && parts.length > 0 ? cleanText(parts[0], 220).toLowerCase() : "";
          if (!first) return null;
          const root = byLabel.get(first);
          if (!root) return null;
          matched.push(root.id);
        }
        const uniqueIds = Array.from(new Set(matched));
        if (uniqueIds.length !== 1) return null;
        const map = nodeMap();
        return map.get(uniqueIds[0]) || null;
      }

      function inferSingleTopSegment(paths) {
        if (!Array.isArray(paths) || paths.length === 0) return "";
        const tops = [];
        for (const parts of paths) {
          const first = Array.isArray(parts) && parts.length > 0 ? cleanText(parts[0], 120) : "";
          if (!first) return "";
          tops.push(first);
        }
        const unique = Array.from(new Set(tops.map((x) => x.toLowerCase())));
        if (unique.length !== 1) return "";
        return tops[0];
      }

      function topLevelLabelSet() {
        const out = new Set();
        for (const n of state.nodes) {
          if ((n.parentId || "root") !== "root") continue;
          const label = cleanText(n.label, 220).toLowerCase();
          if (label) out.add(label);
        }
        return out;
      }

      function extractIndentedPathsFromText(rawText) {
        const text = String(rawText || "");
        if (!text.trim()) return [];
        const lines = text.split(/\r?\n/);
        const stack = [];
        const out = [];
        const seen = new Set();
        let nonEmptyLineCount = 0;
        let bulletLineCount = 0;
        let maxDepth = 0;

        for (const rawLine of lines) {
          const lineRaw = String(rawLine || "");
          if (!lineRaw.trim()) continue;
          nonEmptyLineCount += 1;
          const lineTabsNormalised = lineRaw.replace(/\t/g, "  ");
          const indent = (lineTabsNormalised.match(/^\s*/) || [""])[0].length;
          const trimmed = lineTabsNormalised.trim();
          const bulletMatch = trimmed.match(/^(?:[-*+•]|\d+[.)])\s+(.+)$/);
          if (!bulletMatch) continue;
          bulletLineCount += 1;
          let label = cleanText(bulletMatch[1], 220);
          label = label.replace(/^\[[xX ]\]\s+/, "");
          label = label.replace(/^['"](.+)['"]$/, "$1").trim();
          if (!label) continue;

          while (stack.length && indent <= stack[stack.length - 1].indent) stack.pop();
          stack.push({ indent, label });
          if (stack.length < 2) continue;

          maxDepth = Math.max(maxDepth, stack.length);
          const parts = stack.map((s) => cleanText(s.label, 120)).filter(Boolean);
          if (parts.length < 2) continue;
          const key = parts.join("\u0000");
          if (seen.has(key)) continue;
          seen.add(key);
          out.push(parts);
        }

        if (out.length === 0) return [];
        const bulletRatio = nonEmptyLineCount > 0 ? (bulletLineCount / nonEmptyLineCount) : 0;
        if (bulletLineCount < 4) return [];
        if (bulletRatio < 0.7) return [];
        if (maxDepth < 2) return [];
        return out;
      }

      function parseCaptureSlashPathBatch(rawText) {
        const source = String(rawText || "")
          .replace(/[\u200B-\u200D\uFEFF]/g, "")
          .replace(/\r\n?/g, "\n")
          .replace(/[\u2028\u2029]/g, "\n");
        const withoutCommand = source.replace(/^\s*(?:add|new|create)\s+/i, "");

        const normalisePathLine = (line) => {
          let cleaned = String(line || "").trim();
          if (!cleaned) return "";
          cleaned = cleaned.replace(/^[>\-*\u2022]+\s*/, "");
          cleaned = cleaned.replace(/^\d+[\.\)]\s+/, "");
          const firstSlash = cleaned.indexOf("/");
          if (firstSlash > 0 && /^[^a-z0-9/]+$/i.test(cleaned.slice(0, firstSlash))) {
            cleaned = cleaned.slice(firstSlash);
          }
          return cleanText(cleaned, 900);
        };

        const isPathLine = (line) => {
          const cleaned = normalisePathLine(line);
          if (!cleaned.startsWith("/")) return false;
          return cleaned.replace(/^\/+/, "").includes("/");
        };

        let lineEntries = withoutCommand
          .split("\n")
          .map((line, index) => ({
            lineNumber: index + 1,
            text: normalisePathLine(line),
          }))
          .filter((entry) => !!entry.text && isPathLine(entry.text));
        const initialSinglePathLine = lineEntries.length === 1 ? lineEntries[0] : null;

        // Fallback: some clipboard targets collapse multi-line path lists into one long line.
        if (lineEntries.length < 2) {
          const compact = withoutCommand.replace(/\n+/g, " ").replace(/\s+/g, " ").trim();
          if (!compact) return { matched: false, ok: false };

          let starts = [];
          for (let i = 0; i < compact.length; i += 1) {
            if (compact[i] !== "/") continue;
            if (i === 0 || /\s/.test(compact[i - 1])) starts.push(i);
          }

          if (starts.length < 2) {
            const firstPathParts = compact
              .replace(/^\/+/, "")
              .split("/")
              .map((part) => cleanText(part, 120))
              .filter(Boolean);
            const seg1 = cleanText(firstPathParts[0], 120);
            const seg2 = cleanText(firstPathParts[1], 120);
            const prefixCandidates = [];
            if (seg1 && seg2) {
              prefixCandidates.push(`/${seg1}/${seg2}/`);
              prefixCandidates.push(`/${seg1}/${seg2}`);
            }
            if (seg1) prefixCandidates.push(`/${seg1}/`);

            for (const token of prefixCandidates) {
              if (!token) continue;
              const tokenStarts = [];
              let from = 0;
              while (from < compact.length) {
                const at = compact.indexOf(token, from);
                if (at < 0) break;
                tokenStarts.push(at);
                from = at + 1;
              }
              if (tokenStarts.length >= 2) {
                starts = tokenStarts;
                break;
              }
            }
          }

          if (starts.length < 2) {
            if (initialSinglePathLine) {
              lineEntries = [initialSinglePathLine];
            } else {
              return { matched: false, ok: false };
            }
          } else {
            lineEntries = starts
              .map((start, idx) => {
                const end = idx + 1 < starts.length ? starts[idx + 1] : compact.length;
                return normalisePathLine(compact.slice(start, end));
              })
              .filter((line) => isPathLine(line))
              .map((line, idx) => ({ lineNumber: idx + 1, text: line }));
            if (lineEntries.length < 2 && initialSinglePathLine) {
              lineEntries = [initialSinglePathLine];
            } else if (lineEntries.length < 2) {
              return { matched: false, ok: false };
            }
          }
        }

        const lines = lineEntries.map((entry, index) => {
          if (index !== 0) return entry;
          const withCommand = entry.text.match(/^(?:add|new|create)\s+(.+)$/i);
          return {
            ...entry,
            text: withCommand ? cleanText(withCommand[1], 900) : entry.text,
          };
        });

        const entries = [];
        for (const lineEntry of lines) {
          const line = String(lineEntry.text || "");
          if (!line.startsWith("/")) {
            return {
              matched: true,
              ok: false,
              message: `Line ${lineEntry.lineNumber}: use /path/item format.`,
            };
          }
          if (!line.replace(/^\/+/, "").includes("/")) {
            return {
              matched: true,
              ok: false,
              message: `Line ${lineEntry.lineNumber}: use /path/item format.`,
            };
          }
          const parts = line
            .replace(/^\/+/, "")
            .split("/")
            .map((part) => cleanText(part, 120))
            .filter(Boolean);
          if (parts.length < 2) {
            return {
              matched: true,
              ok: false,
              message: `Line ${lineEntry.lineNumber}: use /path/item format.`,
            };
          }
          entries.push({
            lineNumber: lineEntry.lineNumber,
            parts,
          });
        }

        if (entries.length === 0) return { matched: false, ok: false };
        return { matched: true, ok: true, entries };
      }

      function extractSlashPathsFromText(rawText) {
        const text = String(rawText || "");
        if (!text.trim()) return [];
        const slashBatch = parseCaptureSlashPathBatch(text);
        if (slashBatch.matched) {
          if (!slashBatch.ok) {
            lastPathExtractMeta = {
              strictAbsoluteMode: false,
              ignoredNonAbsoluteCount: 0,
              nonEmptyPrepared: 0,
              absolutePrepared: 0,
              extractedCount: 0,
              source: "slash_batch_error",
              parseError: cleanText(slashBatch.message, 220),
            };
            return [];
          }
          const out = [];
          const seen = new Set();
          for (const entry of slashBatch.entries) {
            const parts = Array.isArray(entry?.parts)
              ? entry.parts.map((part) => cleanText(part, 120)).filter(Boolean)
              : [];
            if (parts.length < 2) continue;
            const key = parts.join("\u0000");
            if (seen.has(key)) continue;
            seen.add(key);
            out.push(parts);
          }
          lastPathExtractMeta = {
            strictAbsoluteMode: true,
            ignoredNonAbsoluteCount: 0,
            nonEmptyPrepared: slashBatch.entries.length,
            absolutePrepared: slashBatch.entries.length,
            extractedCount: out.length,
            source: "slash_batch",
            parseError: "",
          };
          return out;
        }
        const out = [];
        const seen = new Set();
        const lines = text.split(/\r?\n/);
        const cleanImportLine = (rawLine) => {
          let line = String(rawLine || "").trim();
          if (!line) return "";
          line = line.replace(/^>+\s+/, "");
          line = line.replace(/^[-*+]\s+\[[xX ]\]\s+/, "");
          line = line.replace(/^[*\-+•]\s+/, "");
          line = line.replace(/^\d+[.)]\s+/, "");
          line = line.replace(/^add\s+/i, "").trim();
          line = line.replace(/^['"](.+)['"]\s*[,;]?$/, "$1").trim();
          return line;
        };
        const prepared = lines.map((rawLine) => cleanImportLine(rawLine));
        let nonEmptyPrepared = 0;
        let absolutePrepared = 0;
        for (const preparedLine of prepared) {
          if (!preparedLine) continue;
          nonEmptyPrepared += 1;
          if (preparedLine.startsWith("/")) absolutePrepared += 1;
        }
        // Hardening: if a paste is mostly absolute paths, ignore non-absolute stragglers
        // so wrapped text or sentence fragments cannot create unintended nodes.
        const strictAbsoluteMode = nonEmptyPrepared > 0
          && absolutePrepared >= 3
          && (absolutePrepared / nonEmptyPrepared) >= 0.3;
        let ignoredNonAbsoluteCount = 0;

        for (let line of prepared) {
          if (!line) continue;
          if (!/[\\/]/.test(line)) {
            if (/\s*->\s*/.test(line) || /\s*>\s*/.test(line)) {
              line = line.replace(/\s*(?:->|>)\s*/g, "/");
            } else if (/\s*\|\s*/.test(line)) {
              line = line.replace(/\s*\|\s*/g, "/");
            }
          }
          line = line.replace(/\\/g, "/");
          const hasHttpPrefix = /^https?:\/\//i.test(line);
          line = line.replace(/\s*\/\s*/g, "/");
          line = line.replace(/\/{2,}/g, "/");
          let candidate = line;
          if (!candidate.startsWith("/")) {
            if (strictAbsoluteMode) {
              ignoredNonAbsoluteCount += 1;
              continue;
            }
            const hasLetters = /[A-Za-z]/.test(candidate);
            const rawParts = candidate.split("/").map((part) => cleanText(part, 120)).filter(Boolean);
            const looksLikePath = rawParts.length >= 3;
            if (hasHttpPrefix || !hasLetters || !looksLikePath) continue;
            candidate = `/${candidate}`;
          }
          const parts = candidate
            .split("/")
            .map((part) => cleanText(part, 120))
            .filter(Boolean);
          if (parts.length === 0) continue;
          const key = parts.join("\u0000");
          if (seen.has(key)) continue;
          seen.add(key);
          out.push(parts);
        }
        if (out.length > 0) {
          lastPathExtractMeta = {
            strictAbsoluteMode,
            ignoredNonAbsoluteCount,
            nonEmptyPrepared,
            absolutePrepared,
            extractedCount: out.length,
            source: "slash",
            parseError: "",
          };
          return out;
        }
        const indented = extractIndentedPathsFromText(rawText);
        lastPathExtractMeta = {
          strictAbsoluteMode: false,
          ignoredNonAbsoluteCount: 0,
          nonEmptyPrepared,
          absolutePrepared,
          extractedCount: indented.length,
          source: indented.length > 0 ? "indented" : "none",
          parseError: "",
        };
        return indented;
      }

      function analyseBulkPathIntent(rawText) {
        const raw = String(rawText || "");
        const lines = raw
          .split(/\r?\n/)
          .map((line) => cleanText(line, 400))
          .filter(Boolean);
        if (lines.length < 2) {
          return {
            lineCount: lines.length,
            parsedPathCount: 0,
            pathishCount: 0,
            parsedThreshold: 0,
            pathishThreshold: 0,
            isLikelyBulk: false,
          };
        }
        const parsedPathCount = extractSlashPathsFromText(raw).length;
        const parsedThreshold = Math.max(2, Math.ceil(lines.length * 0.4));
        let pathishCount = 0;
        for (const rawLine of lines) {
          let line = rawLine;
          line = line.replace(/^>+\s+/, "");
          line = line.replace(/^[-*+]\s+\[[xX ]\]\s+/, "");
          line = line.replace(/^[*\-+•]\s+/, "");
          line = line.replace(/^\d+[.)]\s+/, "");
          line = line.replace(/^add\s+/i, "").trim();
          if (/[\\/]|->|>|\|/.test(line)) pathishCount += 1;
        }
        const pathishThreshold = Math.max(2, Math.ceil(lines.length * 0.5));
        const isLikelyBulk = (
          (parsedPathCount > 0 && parsedPathCount >= parsedThreshold)
          || pathishCount >= pathishThreshold
        );
        return {
          lineCount: lines.length,
          parsedPathCount,
          pathishCount,
          parsedThreshold,
          pathishThreshold,
          isLikelyBulk,
        };
      }

      function looksLikeBulkPathIntent(rawText) {
        return analyseBulkPathIntent(rawText).isLikelyBulk;
      }

      function isMostlyFlatPathList(paths) {
        const safe = Array.isArray(paths) ? paths : [];
        if (safe.length < 8) return false;
        let singleSeg = 0;
        for (const p of safe) {
          if (Array.isArray(p) && p.length === 1) singleSeg += 1;
        }
        return singleSeg / safe.length >= 0.8;
      }

      function buildPathImportPlan(paths, anchorHead) {
        const topLevelNames = topLevelLabelSet();
        const keySep = "\u0000";
        const childByKey = new Map();
        for (const n of state.nodes) {
          const pid = cleanText(n.parentId, 80) || "root";
          const label = cleanText(n.label, 120).toLowerCase();
          if (!label) continue;
          childByKey.set(`${pid}${keySep}${label}`, n.id);
        }
        let virtualCount = 0;
        let newNodeCount = 0;
        let newTopLevelCount = 0;
        const newTopLevelLabels = new Set();
        const entries = [];
        for (const parts of paths) {
          let effectiveParts = parts.slice();
          if (anchorHead && effectiveParts.length > 0) {
            const first = cleanText(effectiveParts[0], 120).toLowerCase();
            if (topLevelNames.has(first)) effectiveParts = effectiveParts.slice(1);
          }
          if (effectiveParts.length === 0) continue;
          let parentId = anchorHead ? anchorHead.id : "root";
          let createdInPath = 0;
          for (const rawPart of effectiveParts) {
            const part = cleanText(rawPart, 120);
            if (!part) continue;
            const key = `${parentId}${keySep}${part.toLowerCase()}`;
            let childId = childByKey.get(key) || "";
            if (!childId) {
              virtualCount += 1;
              childId = `virt_${virtualCount}`;
              childByKey.set(key, childId);
              createdInPath += 1;
              newNodeCount += 1;
              if (parentId === "root") {
                newTopLevelCount += 1;
                if (part) newTopLevelLabels.add(part);
              }
            }
            parentId = childId;
          }
          entries.push({
            originalParts: parts.slice(),
            effectiveParts,
            createdInPath,
          });
        }
        const existingCount = entries.filter((e) => e.createdInPath === 0).length;
        return {
          entries,
          pathCount: entries.length,
          newNodeCount,
          existingCount,
          newTopLevelCount,
          newTopLevelLabels: Array.from(newTopLevelLabels),
        };
      }

      function queuePathImport(rawText, options = {}) {
        const opts = {
          clearDraft: false,
          requireAnchor: false,
          sourceInfo: null,
          ...options,
        };
        const paths = extractSlashPathsFromText(rawText);
        const importMeta = lastPathExtractMeta && typeof lastPathExtractMeta === "object"
          ? lastPathExtractMeta
          : null;
        const parseError = importMeta
          ? cleanText(importMeta.parseError, 220)
          : "";
        if (paths.length === 0) {
          if (parseError) {
            setStatus(parseError, "warn");
            return -1;
          }
          return 0;
        }
        const ignoredNonAbsoluteCount = importMeta && importMeta.strictAbsoluteMode
          ? Math.max(0, Number(importMeta.ignoredNonAbsoluteCount || 0))
          : 0;
        let anchorHead = resolveImportAnchorHeadNode();
        if (!anchorHead && isMostlyFlatPathList(paths)) {
          setStatus("Import looks like a flat list. Focus a destination node first, then import.", "warn");
          return -1;
        }
        const inferredTop = inferSingleTopSegment(paths);
        if (opts.requireAnchor && !anchorHead) {
          anchorHead = inferAnchorHeadFromPaths(paths);
        }
        if (opts.requireAnchor && !anchorHead && !inferredTop) {
          setStatus("Pick a head node first, then import.", "warn");
          return -1;
        }
        const plan = buildPathImportPlan(paths, anchorHead);
        if (!plan || plan.pathCount === 0) {
          setStatus("No valid path lines to import.", "warn");
          return -1;
        }
        const ROOT_SAFETY_TOP_LEVEL_LIMIT = 8;
        const hasSharedFirstSegment = !!inferredTop;
        if (!anchorHead && !hasSharedFirstSegment && plan.newTopLevelCount >= ROOT_SAFETY_TOP_LEVEL_LIMIT) {
          setStatus(
            `Safety check: preview would create ${plan.newTopLevelCount} new top-level nodes. Focus a destination first, or use a shared first segment path like /Role Map/...`,
            "warn"
          );
          return -1;
        }
        state.pendingPathImport = {
          queuedAt: nowIso(),
          anchorHeadId: anchorHead ? anchorHead.id : "",
          autoAnchorHeadLabel: (!anchorHead && hasSharedFirstSegment) ? inferredTop : "",
          sourceInfo: opts.sourceInfo && typeof opts.sourceInfo === "object" ? opts.sourceInfo : null,
          clearDraft: !!opts.clearDraft,
          entries: plan.entries,
          pathCount: plan.pathCount,
          newNodeCount: plan.newNodeCount,
          existingCount: plan.existingCount,
          newTopLevelCount: plan.newTopLevelCount,
          ignoredNonAbsoluteCount,
        };
        if (opts.clearDraft) el.draft.value = "";
        const targetText = anchorHead
          ? getPath(anchorHead.id)
          : (inferredTop || "inferred root path");
        let previewTargetNode = anchorHead || null;
        if (!previewTargetNode && inferredTop) {
          previewTargetNode = findChildByLabel("root", inferredTop);
        }
        if (previewTargetNode) {
          state.selectedId = previewTargetNode.id;
          state.focusRootId = previewTargetNode.id;
