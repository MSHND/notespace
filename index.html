          state.collapsed.delete(previewTargetNode.id);
          expandPathToNode(previewTargetNode.id);
        }
        const ignoredText = ignoredNonAbsoluteCount > 0
          ? ` Ignored ${ignoredNonAbsoluteCount} non-path line${ignoredNonAbsoluteCount === 1 ? "" : "s"}.`
          : "";
        const anchorModeText = (!anchorHead && hasSharedFirstSegment)
          ? " Auto-anchor: first segment."
          : "";
        setStatus(
          `Import ready: ${plan.pathCount} path line${plan.pathCount === 1 ? "" : "s"}, ${plan.newNodeCount} new, ${plan.existingCount} existing. Target: ${targetText}.${anchorModeText}${ignoredText} Click Import now or Cancel import.`,
          "ok"
        );
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        if (previewTargetNode) revealPreviewTargetNode(previewTargetNode.id);
        return plan.pathCount;
      }

      function commitPendingPathImport() {
        const pending = state.pendingPathImport;
        if (!pending || !Array.isArray(pending.entries) || pending.entries.length === 0) {
          setStatus("No pending import.", "warn");
          return 0;
        }
        // Safety snapshot before bulk import, so Restore last can recover quickly.
        const safetyPayload = {
          ...(state.rootExtras || {}),
          schema: "portal.export.v1",
          exportedAt: nowIso(),
          writtenAt: nowIso(),
          mainThoughtTree: state.nodes,
          mainThoughtTreeTombstones: state.tombstones,
          data: {
            ...(state.dataExtras || {}),
            mainThoughtTree: state.nodes,
            mainThoughtTreeTombstones: state.tombstones,
          },
        };
        saveLastSaveSnapshot(safetyPayload);
        if (el.btnRestoreLast) el.btnRestoreLast.disabled = !state.hasSaveSnapshot;
        const map = nodeMap();
        let anchorHead = pending.anchorHeadId ? (map.get(pending.anchorHeadId) || null) : null;
        if (!anchorHead) {
          const autoAnchorLabel = cleanText(pending.autoAnchorHeadLabel, 120);
          if (autoAnchorLabel) {
            anchorHead = findChildByLabel("root", autoAnchorLabel) || ensurePathNode([autoAnchorLabel]);
          }
        }
        const beforeIds = new Set(state.nodes.map((n) => n.id));
        let lastNode = null;
        let focusNode = null;
        for (const entry of pending.entries) {
          let parts = Array.isArray(entry.effectiveParts) ? entry.effectiveParts.slice() : [];
          if (anchorHead && parts.length > 0) {
            const first = cleanText(parts[0], 120).toLowerCase();
            const anchorLabel = cleanText(anchorHead.label, 120).toLowerCase();
            if (first && anchorLabel && first === anchorLabel) parts = parts.slice(1);
          }
          if (parts.length === 0) {
            if (!focusNode && anchorHead) focusNode = anchorHead;
            continue;
          }
          lastNode = anchorHead
            ? ensurePathNodeUnder(anchorHead.id, parts)
            : ensurePathNode(parts);
          if (!focusNode) {
            const firstPart = cleanText(parts[0], 120);
            if (firstPart) {
              focusNode = anchorHead
                ? findChildByLabel(anchorHead.id, firstPart)
                : findChildByLabel("root", firstPart);
            }
          }
        }
        const createdIds = state.nodes
          .map((n) => n.id)
          .filter((id) => !beforeIds.has(id));
        if (!focusNode) focusNode = lastNode || anchorHead || null;
        if (focusNode) {
          state.selectedId = focusNode.id;
          state.focusRootId = focusNode.id;
          state.collapsed.delete(focusNode.id);
          expandPathToNode(focusNode.id);
        }
        if (el.search && cleanText(el.search.value, 160)) el.search.value = "";
        if (pending.sourceInfo && typeof pending.sourceInfo === "object") {
          state.source = {
            schema: cleanText(pending.sourceInfo.schema, 80) || "path.lines",
            fileName: cleanText(pending.sourceInfo.fileName, 120),
            writtenAt: cleanText(pending.sourceInfo.writtenAt, 40),
            loadedAt: nowIso(),
          };
        }
        state.lastImportBatch = {
          createdIds,
          pathCount: pending.pathCount || 0,
          anchorHeadId: anchorHead ? anchorHead.id : (pending.anchorHeadId || ""),
          at: nowIso(),
        };
        state.pendingPathImport = null;
        recordOp({
          type: "import_paths",
          pathCount: pending.pathCount || 0,
          created: createdIds.length,
          anchor: pending.anchorHeadId || "root",
        });
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        if (focusNode) revealImportedNode(focusNode.id);
        const importPath = focusNode ? getPath(focusNode.id) : (anchorHead ? getPath(anchorHead.id) : "");
        const ignoredNonAbsoluteCount = Math.max(0, Number(pending.ignoredNonAbsoluteCount || 0));
        const ignoredText = ignoredNonAbsoluteCount > 0
          ? ` Ignored ${ignoredNonAbsoluteCount} non-path line${ignoredNonAbsoluteCount === 1 ? "" : "s"}.`
          : "";
        setStatus(importPath ? `Imported to: ${importPath}.${ignoredText}` : `Imported ${pending.pathCount} path line${pending.pathCount === 1 ? "" : "s"}.${ignoredText}`, "ok");
        return pending.pathCount || 0;
      }

      function cancelPendingPathImport() {
        const pending = state.pendingPathImport;
        const count = pending && Number(pending.pathCount || 0) > 0 ? Number(pending.pathCount) : 0;
        if (count === 0) {
          setStatus("No pending import.", "warn");
          return 0;
        }
        state.pendingPathImport = null;
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus(`Import preview cleared (${count}).`, "ok");
        return count;
      }

      function undoLastImportBatch() {
        const batch = state.lastImportBatch;
        if (!batch || !Array.isArray(batch.createdIds) || batch.createdIds.length === 0) {
          setStatus("No import to undo.", "warn");
          return 0;
        }
        const drop = new Set(batch.createdIds.map((id) => cleanText(id, 80)).filter(Boolean));
        const before = state.nodes.length;
        state.nodes = state.nodes.filter((n) => !drop.has(n.id));
        const removed = Math.max(0, before - state.nodes.length);
        if (removed === 0) {
          state.lastImportBatch = null;
          refreshMeta();
          renderTree();
          persistPipSnapshot();
          setStatus("Nothing changed to undo.", "warn");
          return 0;
        }
        const deletedAt = nowIso();
        state.tombstones.push(...Array.from(drop).map((id) => ({ id, deletedAt })));
        if (state.selectedId && drop.has(state.selectedId)) state.selectedId = "";
        if (state.focusRootId && drop.has(state.focusRootId)) state.focusRootId = "";
        state.lastImportBatch = null;
        recordOp({
          type: "undo_import_paths",
          removed,
        });
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus(`Undo import: removed ${removed} node${removed === 1 ? "" : "s"}.`, "ok");
        return removed;
      }

      function ancestorIds(nodeId) {
        const map = nodeMap();
        const out = [];
        let cur = map.get(nodeId) || null;
        let guard = 0;
        while (cur && guard < 200) {
          out.push(cur.id);
          if (!cur.parentId || cur.parentId === "root") break;
          cur = map.get(cur.parentId) || null;
          guard += 1;
        }
        return out;
      }

      function getExpandableIds() {
        const byParent = childrenMap();
        return state.nodes
          .filter((n) => ((byParent.get(n.id) || []).length > 0))
          .map((n) => n.id);
      }

      function collapseAllNodes() {
        state.collapsed = new Set(getExpandableIds());
      }

      function unfoldAllNodes() {
        for (const id of getExpandableIds()) state.collapsed.delete(id);
      }

      function expandPathToNode(nodeId) {
        const ids = ancestorIds(nodeId);
        for (const id of ids) state.collapsed.delete(id);
      }

      function focusUpOneLevel() {
        if (!state.focusRootId) return;
        const map = nodeMap();
        const current = map.get(state.focusRootId);
        if (!current) {
          state.focusRootId = "";
          refreshMeta();
          renderTree();
          persistPipSnapshot();
          return;
        }
        const next = current.parentId && current.parentId !== "root" ? current.parentId : "";
        state.focusRootId = next;
        state.selectedId = next || current.id;
        if (next) state.collapsed.add(next);
        refreshMeta();
        renderTree();
        persistPipSnapshot();
      }

      function toggleUnfoldAll() {
        const expandableIds = getExpandableIds();
        if (expandableIds.length === 0) {
          setStatus("Nothing to fold or unfold.", "warn");
          return;
        }
        const anyCollapsed = expandableIds.some((id) => state.collapsed.has(id));
        if (anyCollapsed) {
          for (const id of expandableIds) state.collapsed.delete(id);
          setStatus("Unfolded all.", "ok");
        } else {
          for (const id of expandableIds) state.collapsed.add(id);
          setStatus("Folded all.", "ok");
        }
        refreshMeta();
        renderTree();
        refocusTreeNavigation(state.selectedId);
        persistPipSnapshot();
      }

      function focusTodayNode() {
        const todayNode = findPathNode(["Work (CoA)", "Current"])
          || findPathNode(["Personal", "Today"])
          || findPathNode(["Today"]);
        if (!todayNode) {
          setStatus('Could not find "Today" node.', "warn");
          return;
        }
        state.focusRootId = todayNode.id;
        state.selectedId = todayNode.id;
        state.collapsed.add(todayNode.id);
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus(`Focused: ${getPath(todayNode.id)}.`, "ok");
      }

      function focusSelectedNode() {
        if (!state.selectedId) {
          setStatus("Select a node first.", "warn");
          return;
        }
        state.focusRootId = state.selectedId;
        state.collapsed.add(state.selectedId);
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus(`Focused: ${getPath(state.selectedId)}.`, "ok");
      }

      function isDetailsEditorOpen() {
        return !!state.detailsEdit.id && !(el.detailOverlay?.hidden ?? true);
      }

      function closeDetailsEditor(options = {}) {
        if (el.detailOverlay instanceof HTMLElement) {
          el.detailOverlay.hidden = true;
        }
        const preferredNodeId = cleanText(options.nodeId || state.selectedId, 80);
        state.detailsEdit = {
          id: "",
          originalLabel: "",
          originalDetails: "",
        };
        if (options.restoreFocus === false) return;
        refocusTreeNavigation(preferredNodeId);
      }

      function openDetailsEditorForSelectedNode() {
        if (!state.selectedId) {
          setStatus("Select a node first.", "warn");
          return;
        }
        const map = nodeMap();
        const node = map.get(state.selectedId);
        if (!node) {
          setStatus("Selected node was not found.", "warn");
          return;
        }
        state.detailsEdit = {
          id: node.id,
          originalLabel: cleanText(node.label, 220),
          originalDetails: normaliseDetails(node.details, 4000),
        };
        if (el.detailEditorTitle) {
          el.detailEditorTitle.textContent = `Edit ${cleanText(node.label, 80) || "item"}`;
        }
        if (el.detailEditorPath) {
          const path = getPath(node.id);
          el.detailEditorPath.textContent = path ? path : "";
          el.detailEditorPath.title = path || "";
        }
        if (el.detailEditorLabel instanceof HTMLInputElement) {
          el.detailEditorLabel.value = cleanText(node.label, 220);
        }
        if (el.detailEditorBody instanceof HTMLTextAreaElement) {
          el.detailEditorBody.value = normaliseDetails(node.details, 4000);
        }
        if (el.detailOverlay instanceof HTMLElement) {
          el.detailOverlay.hidden = false;
        }
        requestAnimationFrame(() => {
          if (el.detailEditorLabel instanceof HTMLInputElement) {
            el.detailEditorLabel.focus();
            el.detailEditorLabel.select();
          }
        });
        setStatus(`Details ready for "${cleanText(node.label, 80)}".`, "ok");
      }

      function saveDetailsEditor() {
        const nodeId = cleanText(state.detailsEdit.id, 80);
        if (!nodeId) {
          closeDetailsEditor({ restoreFocus: true });
          return;
        }
        const map = nodeMap();
        const node = map.get(nodeId);
        if (!node) {
          closeDetailsEditor({ restoreFocus: true });
          setStatus("Selected node was not found.", "warn");
          return;
        }
        const nextLabel = cleanText(el.detailEditorLabel?.value, 220);
        if (!nextLabel) {
          setStatus("Name cannot be blank.", "warn");
          if (el.detailEditorLabel instanceof HTMLInputElement) {
            el.detailEditorLabel.focus();
            el.detailEditorLabel.select();
          }
          return;
        }
        const nextDetails = normaliseDetails(el.detailEditorBody?.value, 4000);
        const prevLabel = cleanText(node.label, 220);
        const prevDetails = normaliseDetails(node.details, 4000);
        const labelChanged = nextLabel !== prevLabel;
        const detailsChanged = nextDetails !== prevDetails;
        if (!labelChanged && !detailsChanged) {
          closeDetailsEditor({ restoreFocus: true, nodeId });
          setStatus("No detail changes.", "warn");
          return;
        }
        node.label = nextLabel;
        if (nextDetails) node.details = nextDetails;
        else delete node.details;
        node.updatedAt = nowIso();

        const changedParts = [];
        if (labelChanged) changedParts.push("name");
        if (detailsChanged) changedParts.push("details");
        recordOp({
          type: "details_edit",
          id: node.id,
          path: getPath(node.id),
          changed: changedParts.join("+"),
        });

        refreshMeta();
        renderTree();
        persistPipSnapshot();
        closeDetailsEditor({ restoreFocus: true, nodeId: node.id });
        setStatus(`Saved ${changedParts.join(" + ")} for "${nextLabel}".`, "ok");
      }

      function handleDetailsEditorKeydown(ev) {
        if (!isDetailsEditorOpen()) return;
        const target = ev.target instanceof HTMLElement ? ev.target : null;
        const isLabelField = target === el.detailEditorLabel;
        const isBodyField = target === el.detailEditorBody;
        if (ev.key === "Escape") {
          ev.preventDefault();
          closeDetailsEditor({ restoreFocus: true });
          setStatus("Details edit cancelled.", "warn");
          return;
        }
        if (
          ev.key === "Enter"
          && isLabelField
          && !ev.metaKey
          && !ev.ctrlKey
          && !ev.altKey
          && !ev.shiftKey
        ) {
          ev.preventDefault();
          saveDetailsEditor();
          return;
        }
        if (ev.key === "Enter" && isBodyField && (ev.metaKey || ev.ctrlKey)) {
          ev.preventDefault();
          saveDetailsEditor();
        }
      }

      function isDescendantOf(nodeId, ancestorId) {
        if (!nodeId || !ancestorId) return false;
        const map = nodeMap();
        let cur = map.get(nodeId) || null;
        let guard = 0;
        while (cur && guard < 200) {
          if (cur.id === ancestorId) return true;
          if (!cur.parentId || cur.parentId === "root") return false;
          cur = map.get(cur.parentId) || null;
          guard += 1;
        }
        return false;
      }

      function moveSelectedToFocus() {
        if (!state.selectedId) {
          setStatus("Select a node to move.", "warn");
          return;
        }
        if (!state.focusRootId) {
          setStatus("Open (focus) a destination node first.", "warn");
          return;
        }
        if (state.selectedId === state.focusRootId) {
          setStatus("Selected node is already focused.", "warn");
          return;
        }
        if (isDescendantOf(state.focusRootId, state.selectedId)) {
          setStatus("Cannot move a node into one of its own children.", "warn");
          return;
        }
        const map = nodeMap();
        const node = map.get(state.selectedId);
        const target = map.get(state.focusRootId);
        if (!node || !target) {
          setStatus("Move failed: selected or destination node not found.", "warn");
          return;
        }
        if ((node.parentId || "root") === target.id) {
          setStatus(`"${node.label}" is already under ${getPath(target.id)}.`, "warn");
          return;
        }
        const fromPath = getPath(node.id);
        const toPath = getPath(target.id);
        lastMoveUndoSnapshot = createTreeUndoSnapshot("move_to_focus");
        lastTreeUndoKind = "move";
        node.parentId = target.id;
        node.order = maxSiblingOrder(target.id) + 1;
        node.updatedAt = nowIso();
        recordOp({
          type: "move",
          id: node.id,
          from: fromPath,
          to: `${toPath} > ${node.label}`,
        });
        expandPathToNode(node.id);
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus(`Moved "${node.label}" to ${toPath}.`, "ok", {
          actionLabel: "Undo",
          onAction: () => undoLastMoveAction(),
        });
      }

      function isUnderCopyTemplates(nodeId) {
        const map = nodeMap();
        let cur = map.get(nodeId) || null;
        let guard = 0;
        while (cur && guard < 200) {
          if (cleanText(cur.label, 220).toLowerCase() === "copy templates") return true;
          if (!cur.parentId || cur.parentId === "root") break;
          cur = map.get(cur.parentId) || null;
          guard += 1;
        }
        return false;
      }

      function isCopyFocusMode() {
        if (isPipMode) return true;
        if (!state.focusRootId) return false;
        const focusPath = getPath(state.focusRootId).toLowerCase();
        if (!focusPath) return false;
        return focusPath.includes("copy templates") || focusPath.endsWith(" > copy") || focusPath === "copy";
      }

      function shouldCopyOnSingleClick(node, hasKids) {
        if (!node || hasKids) return false;
        if (isUnderCopyTemplates(node.id)) return true;
        if (isPipMode) return !hasKids;
        if (isCopyFocusMode()) return !hasKids;
        return false;
      }

      function getPath(nodeId) {
        const map = nodeMap();
        const parts = [];
        let cur = map.get(nodeId) || null;
        let guard = 0;
        while (cur && guard < 200) {
          parts.push(cur.label);
          if (!cur.parentId || cur.parentId === "root") break;
          cur = map.get(cur.parentId) || null;
          guard += 1;
        }
        return parts.reverse().join(" > ");
      }

      function recordOp(op) {
        state.ops.push({
          ...op,
          at: nowIso(),
        });
        el.opsMeta.textContent = `Changes recorded: ${state.ops.length}`;
      }

      function cloneForUndo(value) {
        try {
          if (typeof structuredClone === "function") return structuredClone(value);
        } catch {}
        return JSON.parse(JSON.stringify(value));
      }

      function createTreeUndoSnapshot(kind = "") {
        return {
          kind: cleanText(kind, 40),
          nodes: cloneForUndo(state.nodes),
          tombstones: cloneForUndo(state.tombstones),
          selectedId: cleanText(state.selectedId, 80),
          focusRootId: cleanText(state.focusRootId, 80),
          collapsed: Array.from(state.collapsed),
        };
      }

      function restoreTreeUndoSnapshot(snapshot) {
        if (!snapshot || !Array.isArray(snapshot.nodes)) return false;
        state.nodes = cloneForUndo(snapshot.nodes);
        state.tombstones = Array.isArray(snapshot.tombstones) ? cloneForUndo(snapshot.tombstones) : [];
        state.selectedId = cleanText(snapshot.selectedId, 80);
        state.focusRootId = cleanText(snapshot.focusRootId, 80);
        state.collapsed = new Set(Array.isArray(snapshot.collapsed) ? snapshot.collapsed : []);
        clearInlineEditState();
        state.moveMode = false;
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        refocusTreeNavigation(state.selectedId);
        return true;
      }

      function undoLastDeleteAction() {
        if (!lastDeleteUndoSnapshot) {
          setStatus("Nothing to undo.", "warn");
          return;
        }
        const restored = restoreTreeUndoSnapshot(lastDeleteUndoSnapshot);
        if (!restored) {
          setStatus("Undo unavailable.", "warn");
          return;
        }
        lastDeleteUndoSnapshot = null;
        lastTreeUndoKind = lastMoveUndoSnapshot ? "move" : "";
        setStatus("Delete undone.", "ok");
      }

      function undoLastMoveAction() {
        if (!lastMoveUndoSnapshot) {
          setStatus("Nothing to undo.", "warn");
          return;
        }
        const restored = restoreTreeUndoSnapshot(lastMoveUndoSnapshot);
        if (!restored) {
          setStatus("Undo unavailable.", "warn");
          return;
        }
        lastMoveUndoSnapshot = null;
        lastTreeUndoKind = lastDeleteUndoSnapshot ? "delete" : "";
        setStatus("Move undone.", "ok");
      }

      function undoMostRecentTreeMutation() {
        if (lastTreeUndoKind === "delete" && lastDeleteUndoSnapshot) {
          undoLastDeleteAction();
          return true;
        }
        if (lastTreeUndoKind === "move" && lastMoveUndoSnapshot) {
          undoLastMoveAction();
          return true;
        }
        if (lastMoveUndoSnapshot) {
          undoLastMoveAction();
          return true;
        }
        if (lastDeleteUndoSnapshot) {
          undoLastDeleteAction();
          return true;
        }
        setStatus("Nothing to undo.", "warn");
        return false;
      }

      function compactTopStatus(text, kind = "") {
        let msg = cleanText(text, 260);
        if (!msg) return "";

        const nextIdx = msg.toLowerCase().indexOf(" next:");
        if (nextIdx > 0) msg = msg.slice(0, nextIdx).trim();

        if (/^Loaded \d+ node/i.test(msg)) {
          msg = msg.replace(/ from .*$/i, ".");
        } else if (/^Import ready:/i.test(msg)) {
          msg = "Import ready.";
        } else if (/^Imported \d+ path line/i.test(msg)) {
          msg = "Import complete.";
        } else if (/^Undo import:/i.test(msg)) {
          msg = "Import undone.";
        } else if (/^Copy Templates focused/i.test(msg)) {
          msg = "Copy mode ready.";
        } else if (/^Move mode on/i.test(msg)) {
          msg = "Nudge mode on.";
        } else if (/^Move mode off/i.test(msg)) {
          msg = "Nudge mode off.";
        } else if (/^Remembered \d+ item/i.test(msg)) {
          msg = msg.replace(/ in .*/i, ".");
        } else if (/^Focused:/i.test(msg)) {
          msg = msg.replace(/^Focused:\s*/i, "Focus: ");
        } else if (/^Select a node first\./i.test(msg)) {
          msg = "Pick a node first.";
        } else if (/^Open \(focus\) or select a destination node first\./i.test(msg)) {
          msg = "Pick a destination first.";
        } else if (/^Type one or more lines/i.test(msg)) {
          msg = "Type something first.";
        } else if (/^Type a new label/i.test(msg)) {
          msg = "Type a new name first.";
        }

        if (!kind && msg.length > 74) {
          msg = `${msg.slice(0, 71).trimEnd()}...`;
        } else if (kind && msg.length > 86) {
          msg = `${msg.slice(0, 83).trimEnd()}...`;
        }
        return msg;
      }

      function showDraftHintToast() {
        if (!el.titleToast) return;
        if (Date.now() < statusToastActiveUntil) return;
        const raw = String(el.draft?.value || "");
        const lines = raw.split(/\r?\n/);
        const nonBlank = lines.filter((line) => cleanText(line, 260).length > 0);
        const firstLine = nonBlank[0] || "";
        const directed = parseDirectedDraft(raw);
        const hasDirectedPrefix = /^\s*(add\s+to\s+\/|add\s+.+\s+to\s+\/|to\s+\/)/i.test(firstLine);
        const parsedPathCount = extractSlashPathsFromText(raw).length;
        const hasPathIntent = parsedPathCount > 0 && (
          nonBlank.length > 1
          || /^\s*[\/>*\-+]/.test(raw)
          || /[\\/]|->|>|\|/.test(nonBlank[0] || "")
        );
        const hasPendingImport = !!(state.pendingPathImport && Number(state.pendingPathImport.pathCount || 0) > 0);
        let hint = "Enter to save.";
        if (!nonBlank.length) {
          hint = hasPendingImport ? "Import ready: Enter or click Import." : "Enter to save.";
        } else if (directed) {
          hint = "Enter to save to path.";
        } else if (hasDirectedPrefix) {
          hint = "Add item text, then Enter.";
        } else if (hasPathIntent) {
          hint = "Enter to preview import.";
        } else if (nonBlank.length > 1) {
          hint = "Enter to save lines.";
        } else if (/^\s*(add|move|rename|delete|open|find)\b/i.test(nonBlank[0])) {
          hint = "Enter to run.";
        } else {
          hint = "Enter to remember.";
        }
        el.titleToast.textContent = hint;
        el.titleToast.className = "topStatusToast show";
      }

      function setStatus(text, kind = "", options = {}) {
        const opts = options && typeof options === "object" ? options : {};
        const actionLabel = cleanText(opts.actionLabel, 20);
        const actionHandler = typeof opts.onAction === "function" ? opts.onAction : null;
        statusActionHandler = actionLabel && actionHandler ? actionHandler : null;
        el.status.className = `status${kind ? ` ${kind}` : ""}`;
        el.status.textContent = text;
        if (!el.titleToast) return;
        if (titleToastTimer) {
          clearTimeout(titleToastTimer);
          titleToastTimer = null;
        }
        if (!text) {
          el.titleToast.textContent = "";
          el.titleToast.className = "topStatusToast";
          el.titleToast.removeAttribute("tabindex");
          el.titleToast.removeAttribute("role");
          return;
        }
        const compact = compactTopStatus(text, kind);
        el.titleToast.textContent = statusActionHandler ? `${compact} · ${actionLabel}` : compact;
        el.titleToast.className = `topStatusToast${kind ? ` ${kind}` : ""}${statusActionHandler ? " action" : ""} show`;
        if (statusActionHandler) {
          el.titleToast.setAttribute("tabindex", "0");
          el.titleToast.setAttribute("role", "button");
        } else {
          el.titleToast.removeAttribute("tabindex");
          el.titleToast.removeAttribute("role");
        }
        const requestedMs = Number(opts.durationMs);
        const defaultMs = kind === "warn" ? 4200 : 3200;
        const actionMinMs = statusActionHandler ? 7000 : defaultMs;
        const hideAfterMs = Number.isFinite(requestedMs) && requestedMs > 0
          ? Math.max(actionMinMs, requestedMs)
          : actionMinMs;
        statusToastActiveUntil = Date.now() + hideAfterMs;
        titleToastTimer = window.setTimeout(() => {
          statusActionHandler = null;
          el.titleToast.removeAttribute("tabindex");
          el.titleToast.removeAttribute("role");
          el.titleToast.classList.remove("show");
          showDraftHintToast();
        }, hideAfterMs);
      }

      function flashSaveChip(label = "Saved") {
        if (!el.btnExportTree) return;
        const nextLabel = cleanText(label, 40) || "Saved";
        if (saveChipTimer) {
          clearTimeout(saveChipTimer);
          saveChipTimer = null;
        }
        el.btnExportTree.textContent = nextLabel;
        el.btnExportTree.classList.add("on");
        saveChipTimer = window.setTimeout(() => {
          el.btnExportTree.textContent = "Save";
          el.btnExportTree.classList.remove("on");
          saveChipTimer = null;
        }, 1200);
      }

      function revealImportedNode(nodeId) {
        if (!nodeId || !el.treeRoot) return;
        requestAnimationFrame(() => {
          const escaped = (window.CSS && typeof window.CSS.escape === "function")
            ? window.CSS.escape(nodeId)
            : String(nodeId).replace(/"/g, '\\"');
          const row = el.treeRoot.querySelector(`[data-node-id="${escaped}"]`);
          if (!row) return;
          row.scrollIntoView({ block: "nearest", inline: "nearest" });
          row.classList.add("importFlash");
          if (importRevealTimer) {
            clearTimeout(importRevealTimer);
            importRevealTimer = null;
          }
          importRevealTimer = window.setTimeout(() => {
            row.classList.remove("importFlash");
          }, 1200);
        });
      }

      function revealPreviewTargetNode(nodeId) {
        if (!nodeId || !el.treeRoot) return;
        requestAnimationFrame(() => {
          const escaped = (window.CSS && typeof window.CSS.escape === "function")
            ? window.CSS.escape(nodeId)
            : String(nodeId).replace(/"/g, '\\"');
          const row = el.treeRoot.querySelector(`[data-node-id="${escaped}"]`);
          if (!row) return;
          row.scrollIntoView({ block: "nearest", inline: "nearest" });
        });
      }

      function refreshMeta() {
        const src = state.source;
        el.sourceMeta.textContent = src.fileName
          ? `Loaded: ${src.fileName}${src.schema ? ` | ${src.schema}` : ""}${src.writtenAt ? ` | written ${src.writtenAt}` : ""}`
          : "No file loaded yet.";
        if (!state.selectedId) state.moveMode = false;
        if (!state.selectedId) {
          el.selectedMeta.textContent = "Selected: none";
        } else {
          const path = getPath(state.selectedId);
          el.selectedMeta.textContent = path ? `Selected: ${path}` : "Selected: none";
        }
        const focusPath = state.focusRootId ? getPath(state.focusRootId) : "";
        if (el.focusPath) el.focusPath.textContent = focusPath ? `Focus: ${focusPath}` : "Focus: all";
        if (el.btnFocusUp) el.btnFocusUp.disabled = !focusPath;
        const hasData = state.nodes.length > 0;
        const unsavedCount = Array.isArray(state.ops) ? state.ops.length : 0;
        const hasUnsaved = unsavedCount > 0;
        const hasSelection = !!state.selectedId;
        const hasFocus = !!state.focusRootId;
        const expandableIds = getExpandableIds();
        const anyCollapsed = expandableIds.some((id) => state.collapsed.has(id));
        if (el.btnUnfoldAll) {
          el.btnUnfoldAll.disabled = !hasData || expandableIds.length === 0;
          el.btnUnfoldAll.textContent = anyCollapsed ? "Unfold" : "Fold";
        }
        if (el.btnAddPrimary) el.btnAddPrimary.disabled = false;
        if (el.btnAddMobile) el.btnAddMobile.disabled = false;
        if (document.body && document.body.classList) {
          document.body.classList.toggle("moveModeActive", !!state.moveMode && !!state.selectedId);
        }
        if (!state.moveMode || !state.selectedId) {
          stopMovePadRepeat();
        }
        if (el.btnMovePrimary) {
          el.btnMovePrimary.disabled = !hasSelection;
          el.btnMovePrimary.classList.toggle("on", !!state.moveMode && !!state.selectedId);
        }
        if (el.btnRenamePrimary) el.btnRenamePrimary.disabled = !hasSelection;
        if (el.btnDeletePrimary) el.btnDeletePrimary.disabled = !hasSelection;
        if (el.btnOpenPrimary) el.btnOpenPrimary.disabled = !hasSelection;
        if (el.btnImportNow) {
          const pending = state.pendingPathImport;
          const ready = !!pending && Number(pending.pathCount || 0) > 0;
          el.btnImportNow.disabled = !ready;
          el.btnImportNow.textContent = ready
            ? `Import (${pending.pathCount})`
            : "Import now";
          if (ready) {
            const map = nodeMap();
            const anchorId = cleanText(pending.anchorHeadId, 80);
            const anchor = anchorId ? (map.get(anchorId) || null) : null;
            const targetText = anchor
              ? getPath(anchor.id)
              : (cleanText(pending.autoAnchorHeadLabel, 120) || "inferred root path");
            el.btnImportNow.title = `Import ${pending.pathCount} lines, ${pending.newNodeCount || 0} new, ${pending.existingCount || 0} existing. Target: ${targetText}.`;
          } else {
            el.btnImportNow.title = "No pending import.";
          }
        }
        if (el.btnCancelImport) {
          const pending = state.pendingPathImport;
          const count = pending && Number(pending.pathCount || 0) > 0 ? Number(pending.pathCount) : 0;
          el.btnCancelImport.disabled = !(count > 0);
          el.btnCancelImport.textContent = count > 0
            ? "Cancel"
            : "Cancel import";
          el.btnCancelImport.title = count > 0
            ? `Cancel pending import (${count} lines).`
            : "No pending import.";
        }
        if (el.btnUndoImport) {
          const batch = state.lastImportBatch;
          const count = batch && Array.isArray(batch.createdIds) ? batch.createdIds.length : 0;
          el.btnUndoImport.disabled = !(count > 0);
          el.btnUndoImport.textContent = count > 0
            ? `Undo import (${count})`
            : "Undo import";
        }
        if (el.btnCopyTemplates) el.btnCopyTemplates.disabled = !hasData;
        if (el.btnRememberNow) el.btnRememberNow.disabled = !hasData;
        el.btnExportChanges.disabled = !hasData;
        const isSaving = !!state.saveInProgress;
        el.btnExportTree.disabled = !hasData || isSaving;
        if (isSaving) {
          el.btnExportTree.textContent = "Saving...";
          el.btnExportTree.title = "Writing to truth file";
        } else if (!saveChipTimer) {
          el.btnExportTree.textContent = hasUnsaved ? "Save *" : "Save";
          el.btnExportTree.title = hasUnsaved
            ? `${unsavedCount} unsaved change${unsavedCount === 1 ? "" : "s"}`
            : "No unsaved changes";
        }
        if (el.btnRestoreLast) {
          el.btnRestoreLast.disabled = !state.hasSaveSnapshot;
          el.btnRestoreLast.title = state.lastSaveSnapshotAt
            ? `Restore snapshot from ${state.lastSaveSnapshotAt}`
            : "No snapshot available yet";
        }
        el.btnAddChild.disabled = !state.selectedId;
        el.btnRename.disabled = !state.selectedId;
        el.btnDelete.disabled = !state.selectedId;
        if (el.btnMoveMode) {
          el.btnMoveMode.disabled = !state.selectedId;
          el.btnMoveMode.classList.toggle("on", !!state.moveMode && !!state.selectedId);
          el.btnMoveMode.textContent = state.moveMode && state.selectedId ? "Done moving" : "Move mode";
        }
        const movePadEnabled = !!state.moveMode && !!state.selectedId;
        if (el.btnMovePadUp) el.btnMovePadUp.disabled = !movePadEnabled;
        if (el.btnMovePadDown) el.btnMovePadDown.disabled = !movePadEnabled;
        if (el.btnMovePadLeft) el.btnMovePadLeft.disabled = !movePadEnabled;
        if (el.btnMovePadRight) el.btnMovePadRight.disabled = !movePadEnabled;
      }

      function clearInlineEditState() {
        state.inlineEdit = {
          id: "",
          isNew: false,
          originalLabel: "",
          afterId: "",
          parentId: "",
          autoFocus: false,
        };
      }

      function beginInlineEdit(nodeId, options = {}) {
        const map = nodeMap();
        const node = map.get(nodeId);
        if (!node) return;
        state.selectedId = node.id;
        state.inlineEdit = {
          id: node.id,
          isNew: !!options.isNew,
          originalLabel: typeof options.originalLabel === "string" ? options.originalLabel : node.label,
          afterId: cleanText(options.afterId, 80),
          parentId: cleanText(options.parentId, 80) || (node.parentId || "root"),
          autoFocus: true,
        };
        expandPathToNode(node.id);
        refreshMeta();
        renderTree();
        persistPipSnapshot();
      }

      function cancelInlineEdit(nodeId) {
        if (!state.inlineEdit.id || state.inlineEdit.id !== nodeId) return;
        const edit = { ...state.inlineEdit };
        clearInlineEditState();
        if (edit.isNew) {
          deleteNodeById(nodeId, { confirm: false });
          setStatus("New item cancelled.", "warn");
          refocusTreeNavigation();
          return;
        }
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        refocusTreeNavigation(nodeId);
      }

      function commitInlineEdit(nodeId, rawValue, options = {}) {
        if (!state.inlineEdit.id || state.inlineEdit.id !== nodeId) return;
        const postAction = cleanText(options.postAction, 20).toLowerCase();
        const map = nodeMap();
        const node = map.get(nodeId);
        const edit = { ...state.inlineEdit };
        const slashBatch = parseCaptureSlashPathBatch(rawValue);
        if (slashBatch.matched) {
          if (!slashBatch.ok) {
            setStatus(slashBatch.message || "Use /path/item format, one per line.", "warn");
            return;
          }
          // Safety snapshot before bulk inline import, so Restore last can recover quickly.
          const safetyPayload = {
            ...(state.rootExtras || {}),
            schema: "portal.export.v1",
            exportedAt: nowIso(),
            writtenAt: nowIso(),
            mainThoughtTree: state.nodes,
            mainThoughtTreeTombstones: state.tombstones,
            data: {
              ...(state.dataExtras || {}),
              mainThoughtTree: state.nodes,
              mainThoughtTreeTombstones: state.tombstones,
            },
          };
          saveLastSaveSnapshot(safetyPayload);
          if (el.btnRestoreLast) el.btnRestoreLast.disabled = !state.hasSaveSnapshot;
          clearInlineEditState();
          if (edit.isNew && node && !state.nodes.some((entry) => (entry.parentId || "root") === node.id)) {
            state.nodes = state.nodes.filter((entry) => entry.id !== node.id);
            renumberChildren(edit.parentId || "root");
          }
          const beforeIds = new Set(state.nodes.map((entry) => entry.id));
          let focusNode = null;
          for (const entry of slashBatch.entries) {
            const parts = Array.isArray(entry?.parts)
              ? entry.parts.map((part) => cleanText(part, 120)).filter(Boolean)
              : [];
            if (parts.length < 2) continue;
            const created = ensurePathNode(parts);
            if (!focusNode && parts.length > 0) {
              focusNode = findChildByLabel("root", parts[0]) || created || null;
            }
          }
          const createdIds = state.nodes
            .map((entry) => entry.id)
            .filter((id) => !beforeIds.has(id));
          if (createdIds.length > 0) {
            recordOp({
              type: "import_paths_inline",
              pathCount: Array.isArray(slashBatch.entries) ? slashBatch.entries.length : 0,
              created: createdIds.length,
            });
          }
          if (focusNode) {
            state.selectedId = focusNode.id;
            state.focusRootId = focusNode.id;
            state.collapsed.delete(focusNode.id);
            expandPathToNode(focusNode.id);
          }
          if (el.search instanceof HTMLInputElement && cleanText(el.search.value, 120)) {
            el.search.value = "";
          }
          refreshMeta();
          renderTree();
          persistPipSnapshot();
          if (focusNode) focusRowByNodeId(focusNode.id, { block: "nearest" });
          const importedCount = Array.isArray(slashBatch.entries) ? slashBatch.entries.length : 0;
          if (createdIds.length > 0) {
            setStatus(`Imported ${importedCount} path line${importedCount === 1 ? "" : "s"} (${createdIds.length} new nodes).`, "ok");
          } else {
            setStatus(`Imported ${importedCount} path line${importedCount === 1 ? "" : "s"} (no new nodes).`, "ok");
          }
          return;
        }
        clearInlineEditState();
        if (!node) {
          refreshMeta();
          renderTree();
          persistPipSnapshot();
          refocusTreeNavigation();
          return;
        }
        const next = cleanText(rawValue, 220);
        if (!next) {
          if (edit.isNew) {
            deleteNodeById(nodeId, { confirm: false });
            setStatus("Blank item removed.", "warn");
            refocusTreeNavigation();
            return;
          }
          refreshMeta();
          renderTree();
          persistPipSnapshot();
          setStatus("Label cannot be blank.", "warn");
          refocusTreeNavigation(nodeId);
          return;
        }
        const prev = node.label;
        node.label = next;
        node.updatedAt = nowIso();
        if (edit.isNew) {
          recordOp({ type: "add_below", id: node.id, afterId: edit.afterId, parentId: edit.parentId, label: next });
          setStatus(`Added "${next}".`, "ok");
        } else if (next !== prev) {
          recordOp({ type: "rename", id: node.id, from: prev, to: next });
          setStatus(`Renamed "${prev}" to "${next}".`, "ok");
        }
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        refocusTreeNavigation(node.id);
        if (postAction === "indent") indentNodeById(node.id);
        if (postAction === "outdent") outdentNodeById(node.id);
      }

      function sortNodesForParent(parentId) {
        return state.nodes
          .filter((n) => ((n.parentId || "root") === (parentId || "root")))
          .sort((a, b) => (a.order - b.order) || a.label.localeCompare(b.label));
      }

      function renumberChildren(parentId) {
        const siblings = sortNodesForParent(parentId);
        siblings.forEach((node, index) => {
          node.order = 1001 + index;
        });
      }

      function insertSiblingBelow(nodeId) {
        const map = nodeMap();
        const node = map.get(nodeId);
        if (!node) {
          setStatus("Node not found.", "warn");
          return;
        }
        const parentId = node.parentId || "root";
        const newNode = {
          id: makeId("node"),
          parentId,
          label: "",
          source: "manual",
          order: Number.isFinite(node.order) ? node.order + 0.5 : maxSiblingOrder(parentId) + 1,
          updatedAt: nowIso(),
        };
        state.nodes.push(newNode);
        renumberChildren(parentId);
        beginInlineEdit(newNode.id, {
          isNew: true,
          originalLabel: "",
          afterId: node.id,
          parentId,
        });
        setStatus(`New item below "${node.label}". Type to name it.`, "ok");
      }

      function deleteNodeById(nodeId, options = {}) {
        const opts = { confirm: true, ...options };
        const map = nodeMap();
        const node = map.get(nodeId);
        if (!node) {
          setStatus("Selected node was not found.", "warn");
          return false;
        }
        const ids = collectSubtreeIds(node.id);
        const childCount = Math.max(0, ids.length - 1);
        const message = childCount > 0
          ? `Delete "${node.label}" and ${childCount} child item(s)?`
          : `Delete "${node.label}"?`;
        if (opts.confirm && !window.confirm(message)) return false;

        // Safety snapshot before destructive delete, so Restore last can recover quickly.
        const safetyPayload = {
          ...(state.rootExtras || {}),
          schema: "portal.export.v1",
          exportedAt: nowIso(),
          writtenAt: nowIso(),
          mainThoughtTree: state.nodes,
          mainThoughtTreeTombstones: state.tombstones,
          data: {
            ...(state.dataExtras || {}),
            mainThoughtTree: state.nodes,
            mainThoughtTreeTombstones: state.tombstones,
          },
        };
        saveLastSaveSnapshot(safetyPayload);
        if (el.btnRestoreLast) el.btnRestoreLast.disabled = !state.hasSaveSnapshot;

        const drop = new Set(ids);
        lastDeleteUndoSnapshot = createTreeUndoSnapshot("delete");
        lastTreeUndoKind = "delete";
        const parentId = node.parentId || "root";
        const siblings = sortNodesForParent(parentId);
        const siblingIndex = siblings.findIndex((s) => s.id === node.id);
        const nextSiblingId = siblingIndex >= 0 && siblingIndex + 1 < siblings.length
          ? siblings[siblingIndex + 1].id
          : "";
        const prevSiblingId = siblingIndex > 0 ? siblings[siblingIndex - 1].id : "";
        const parentSelection = parentId !== "root" ? parentId : "";
        const fallbackSelection = nextSiblingId || prevSiblingId || parentSelection;
        state.nodes = state.nodes.filter((n) => !drop.has(n.id));
        state.tombstones.push(...ids.map((id) => ({ id, deletedAt: nowIso() })));
        recordOp({ type: "delete", id: node.id, subtreeCount: ids.length });
        if (state.focusRootId && drop.has(state.focusRootId)) state.focusRootId = "";
        if (state.inlineEdit.id && drop.has(state.inlineEdit.id)) clearInlineEditState();
        state.selectedId = fallbackSelection;
        setStatus(`Deleted ${ids.length} item${ids.length === 1 ? "" : "s"}.`, "ok", {
          actionLabel: "Undo",
          onAction: () => undoLastDeleteAction(),
        });
        refreshMeta();
        renderTree();
        refocusTreeNavigation(state.selectedId);
        persistPipSnapshot();
        return true;
      }

      function indentNodeById(nodeId) {
        const map = nodeMap();
        const node = map.get(nodeId);
        if (!node) {
          setStatus("Selected node was not found.", "warn");
          return;
        }
        const parentId = node.parentId || "root";
        const siblings = sortNodesForParent(parentId);
        const index = siblings.findIndex((s) => s.id === node.id);
        if (index <= 0) {
          setStatus("Indent needs a previous sibling.", "warn");
          return;
        }
        const previousSibling = siblings[index - 1];
        lastMoveUndoSnapshot = createTreeUndoSnapshot("indent");
        lastTreeUndoKind = "move";
        node.parentId = previousSibling.id;
        node.order = maxSiblingOrder(previousSibling.id) + 1;
        node.updatedAt = nowIso();
        renumberChildren(parentId);
        renumberChildren(previousSibling.id);
        state.selectedId = node.id;
        expandPathToNode(node.id);
        recordOp({ type: "indent", id: node.id, newParentId: previousSibling.id });
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus(`Indented "${node.label}" under "${previousSibling.label}".`, "ok", {
          actionLabel: "Undo",
          onAction: () => undoLastMoveAction(),
        });
      }

      function outdentNodeById(nodeId) {
        const map = nodeMap();
        const node = map.get(nodeId);
        if (!node) {
          setStatus("Selected node was not found.", "warn");
          return;
        }
        const parentId = node.parentId || "root";
        if (parentId === "root") {
          setStatus("That node is already at the top level.", "warn");
          return;
        }
        const parent = map.get(parentId);
        if (!parent) {
          setStatus("Could not find the parent node.", "warn");
          return;
        }
        const grandParentId = parent.parentId || "root";
        lastMoveUndoSnapshot = createTreeUndoSnapshot("outdent");
        lastTreeUndoKind = "move";
        node.parentId = grandParentId;
        node.order = Number.isFinite(parent.order) ? parent.order + 0.5 : maxSiblingOrder(grandParentId) + 1;
        node.updatedAt = nowIso();
        renumberChildren(parentId);
        renumberChildren(grandParentId);
        state.selectedId = node.id;
        expandPathToNode(node.id);
        recordOp({ type: "outdent", id: node.id, newParentId: grandParentId, afterId: parent.id });
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus(`Outdented "${node.label}".`, "ok", {
          actionLabel: "Undo",
          onAction: () => undoLastMoveAction(),
        });
      }

      function moveNodeWithinSiblings(nodeId, direction) {
        const map = nodeMap();
        const node = map.get(nodeId);
        if (!node) {
          setStatus("Selected node was not found.", "warn");
          return;
        }
        const parentId = node.parentId || "root";
        const siblings = sortNodesForParent(parentId);
        const index = siblings.findIndex((s) => s.id === node.id);
        if (index < 0) {
          setStatus("Could not find that node among its siblings.", "warn");
          return;
        }
        const targetIndex = direction < 0 ? index - 1 : index + 1;
        if (targetIndex < 0 || targetIndex >= siblings.length) {
          setStatus(direction < 0 ? "That node is already at the top of its level." : "That node is already at the bottom of its level.", "warn");
          return;
        }
        const moving = siblings[index];
        lastMoveUndoSnapshot = createTreeUndoSnapshot(direction < 0 ? "move_up" : "move_down");
        lastTreeUndoKind = "move";
        siblings.splice(index, 1);
        siblings.splice(targetIndex, 0, moving);
        siblings.forEach((item, i) => {
          item.order = 1001 + i;
        });
        node.updatedAt = nowIso();
        state.selectedId = node.id;
        recordOp({ type: direction < 0 ? "move_up" : "move_down", id: node.id, parentId, toIndex: targetIndex });
        refreshMeta();
        renderTree();
        persistPipSnapshot();
        setStatus(`${direction < 0 ? "Moved up" : "Moved down"}: "${node.label}".`, "ok", {
          actionLabel: "Undo",
          onAction: () => undoLastMoveAction(),
        });
      }

      function getVisibleNodeIdsInRenderOrder() {
        if (!(el.treeRoot instanceof HTMLElement)) return [];
        return Array.from(el.treeRoot.querySelectorAll(".row[data-node-id]"))
          .map((row) => cleanText(row.getAttribute("data-node-id"), 80))
          .filter(Boolean);
      }

      function focusRowByNodeId(nodeId, options = {}) {
        const id = cleanText(nodeId, 80);
        if (!id || !(el.treeRoot instanceof HTMLElement)) return;
        requestAnimationFrame(() => {
          const escaped = typeof CSS?.escape === "function" ? CSS.escape(id) : id.replace(/"/g, '\\"');
          const row = el.treeRoot.querySelector(`.row[data-node-id="${escaped}"]`);
          if (row instanceof HTMLElement) {
            row.focus();
            const block = cleanText(options.block, 16).toLowerCase() === "center" ? "center" : "nearest";
            row.scrollIntoView({ block, inline: "nearest" });
          }
        });
      }

      function refocusTreeNavigation(preferredNodeId = "") {
        const id = cleanText(preferredNodeId, 80) || cleanText(state.selectedId, 80);
        requestAnimationFrame(() => {
          if (id && el.treeRoot instanceof HTMLElement) {
            const escaped = typeof CSS?.escape === "function" ? CSS.escape(id) : id.replace(/"/g, '\\"');
            const row = el.treeRoot.querySelector(`.row[data-node-id="${escaped}"]`);
            if (row instanceof HTMLElement) {
              row.scrollIntoView({ block: "nearest", inline: "nearest" });
            }
          }
          if (el.treeWrap instanceof HTMLElement) {
            el.treeWrap.focus({ preventScroll: true });
          }
        });
      }

      function selectNodeById(nodeId, options = {}) {
        const id = cleanText(nodeId, 80);
        if (!id) return false;
        if (!state.nodes.some((n) => n.id === id)) return false;
        state.selectedId = id;
        if (options.expandPath) expandPathToNode(id);
        refreshMeta();
        renderTree();
        focusRowByNodeId(id, { block: "nearest" });
        return true;
      }

      function moveSelectionByVisibleDelta(delta) {
        const visibleIds = getVisibleNodeIdsInRenderOrder();
        if (visibleIds.length === 0) return false;
        const applySelection = (nodeId) => {
          const id = cleanText(nodeId, 80);
          if (!id) return false;
          if (!state.nodes.some((n) => n.id === id)) return false;
          state.selectedId = id;
          refreshMeta();
          renderTree();
          focusRowByNodeId(id, { block: "nearest" });
          return true;
        };
        if (!state.selectedId) {
          const fallbackId = delta < 0 ? visibleIds[visibleIds.length - 1] : visibleIds[0];
          return applySelection(fallbackId);
        }
        const currentIndex = visibleIds.indexOf(state.selectedId);
        if (currentIndex < 0) {
          return applySelection(visibleIds[0]);
        }
        const nextIndex = currentIndex + delta;
        if (nextIndex < 0 || nextIndex >= visibleIds.length) return false;
        return applySelection(visibleIds[nextIndex]);
      }

      function moveSelectionToVisibleEdge(edge) {
        const visibleIds = getVisibleNodeIdsInRenderOrder();
        if (visibleIds.length === 0) return false;
        const toEnd = cleanText(edge, 16).toLowerCase() === "end";
        const nextId = toEnd ? visibleIds[visibleIds.length - 1] : visibleIds[0];
        if (!nextId) return false;
        if (state.selectedId === nextId) return false;
        const id = cleanText(nextId, 80);
        if (!id || !state.nodes.some((n) => n.id === id)) return false;
        state.selectedId = id;
        refreshMeta();
        renderTree();
        focusRowByNodeId(id, { block: "nearest" });
        return true;
      }

      function jumpSelectionByTypedChar(rawKey) {
        const key = cleanText(rawKey, 8).toLowerCase();
        if (!key || key.length !== 1) return false;
        const visibleIds = getVisibleNodeIdsInRenderOrder();
        if (visibleIds.length === 0) return false;
        const map = nodeMap();
        const nowMs = Date.now();
        const activeWindowMs = 850;
        const withinWindow = (nowMs - Number(state.typeJump.lastAt || 0)) <= activeWindowMs;

        if (!withinWindow) {
          state.typeJump.query = key;
          state.typeJump.cycle = 0;
        } else if (state.typeJump.query.length === 1 && state.typeJump.query === key) {
          state.typeJump.cycle += 1;
        } else {
          state.typeJump.query = `${state.typeJump.query}${key}`.slice(0, 40);
          state.typeJump.cycle = 0;
        }
        state.typeJump.lastAt = nowMs;

        const findMatches = (prefix) => {
          const needle = cleanText(prefix, 60).toLowerCase();
          if (!needle) return [];
          return visibleIds.filter((id) => {
            const node = map.get(id);
            const label = cleanText(node?.label || "", 200).toLowerCase();
            return label.startsWith(needle);
          });
        };

        let query = state.typeJump.query;
        let matches = findMatches(query);
        if (matches.length === 0 && query.length > 1) {
          query = key;
          matches = findMatches(query);
          state.typeJump.query = query;
          state.typeJump.cycle = 0;
        }
        if (matches.length === 0) return false;

        const targetId = matches[state.typeJump.cycle % matches.length];
        if (!targetId || !state.nodes.some((n) => n.id === targetId)) return false;
        state.selectedId = targetId;
        refreshMeta();
        renderTree();
        focusRowByNodeId(targetId);
        return true;
      }

      function clearMoveModeIdleTimer() {
        if (moveModeIdleTimer) {
          clearTimeout(moveModeIdleTimer);
          moveModeIdleTimer = null;
        }
      }

      function stopMovePadRepeat() {
        if (movePadRepeatStartTimer) {
          clearTimeout(movePadRepeatStartTimer);
          movePadRepeatStartTimer = null;
        }
        if (movePadRepeatInterval) {
          clearInterval(movePadRepeatInterval);
          movePadRepeatInterval = null;
        }
      }

      function startMovePadRepeat(direction) {
        stopMovePadRepeat();
        moveSelectedViaPad(direction);
        if (!state.moveMode || !state.selectedId) return;
        movePadRepeatStartTimer = window.setTimeout(() => {
          movePadRepeatStartTimer = null;
          movePadRepeatInterval = window.setInterval(() => {
            if (!state.moveMode || !state.selectedId) {
              stopMovePadRepeat();
              return;
            }
            moveSelectedViaPad(direction);
          }, MOVE_PAD_REPEAT_MS);
        }, MOVE_PAD_REPEAT_INITIAL_MS);
      }

      function armMoveModeIdleTimer() {
        clearMoveModeIdleTimer();
        if (!state.moveMode) return;
        moveModeIdleTimer = window.setTimeout(() => {
          moveModeIdleTimer = null;
          if (!state.moveMode) return;
          state.moveMode = false;
          stopMovePadRepeat();
          refreshMeta();
          setStatus("Move mode off (idle).", "ok");
        }, MOVE_MODE_IDLE_MS);
      }

      function toggleMoveMode(force) {
        if (!state.selectedId && force !== false) {
          setStatus("Select a node first.", "warn");
          return;
        }
        const next = typeof force === "boolean" ? force : !state.moveMode;
        state.moveMode = !!next && !!state.selectedId;
        refreshMeta();
        if (state.moveMode) {
          setStatus("Move mode on. Use ↑ ↓ to reorder, → to indent, ← to outdent.", "ok");
          armMoveModeIdleTimer();
          refocusTreeNavigation(state.selectedId);
        }
        else {
          clearMoveModeIdleTimer();
          stopMovePadRepeat();
          setStatus("Move mode off.", "ok");
        }
      }

      function moveSelectedViaPad(direction) {
        if (!state.moveMode || !state.selectedId) return;
        if (direction === "up") moveNodeWithinSiblings(state.selectedId, -1);
        else if (direction === "down") moveNodeWithinSiblings(state.selectedId, 1);
        else if (direction === "left") outdentNodeById(state.selectedId);
        else if (direction === "right") indentNodeById(state.selectedId);
        else return;
        armMoveModeIdleTimer();
        refocusTreeNavigation(state.selectedId);
      }

      function handleTreeKeydown(ev) {
        if (isDetailsEditorOpen()) return;
        if (state.inlineEdit.id) return;
        const lowerKey = String(ev.key || "").toLowerCase();
        if ((ev.metaKey || ev.ctrlKey) && !ev.shiftKey && !ev.altKey && lowerKey === "z") {
          ev.preventDefault();
          undoMostRecentTreeMutation();
          return;
        }
        const hasPendingImport = !!(state.pendingPathImport && Number(state.pendingPathImport.pathCount || 0) > 0);
        if (hasPendingImport && !ev.metaKey && !ev.ctrlKey && !ev.altKey) {
          if (ev.key === "Enter" && !ev.shiftKey) {
            ev.preventDefault();
            commitPendingPathImport();
            refocusTreeNavigation(state.selectedId);
            return;
          }
          if (ev.key === "Escape") {
            ev.preventDefault();
            cancelPendingPathImport();
            refocusTreeNavigation(state.selectedId);
            return;
          }
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.altKey
          && ev.shiftKey
          && ev.key === "Tab"
        ) {
          ev.preventDefault();
          if (el.search instanceof HTMLInputElement) {
            el.search.focus({ preventScroll: true });
            el.search.select();
          }
          return;
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.altKey
          && !ev.shiftKey
          && ev.key === "F2"
        ) {
          ev.preventDefault();
          renameSelected();
          return;
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.altKey
          && !ev.shiftKey
          && (ev.key === "=" || ev.key === "+" || ev.key === "Add")
        ) {
          ev.preventDefault();
          addItemsFromPrimaryAction();
          return;
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.altKey
          && !ev.shiftKey
          && (ev.key === "-" || ev.key === "Subtract" || ev.key === "Delete")
        ) {
          ev.preventDefault();
          deleteSelected();
          return;
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.altKey
          && !ev.shiftKey
          && ev.key.length === 1
          && /\S/.test(ev.key)
        ) {
          ev.preventDefault();
          jumpSelectionByTypedChar(ev.key);
          return;
        }
        if (
          (ev.metaKey || ev.ctrlKey)
          && !ev.shiftKey
          && !ev.altKey
          && ev.key === "ArrowLeft"
        ) {
          ev.preventDefault();
          collapseAllNodes();
          refreshMeta();
          renderTree();
          refocusTreeNavigation(state.selectedId);
          persistPipSnapshot();
          setStatus("Folded all.", "ok");
          return;
        }
        if (
          (ev.metaKey || ev.ctrlKey)
          && !ev.shiftKey
          && !ev.altKey
          && ev.key === "ArrowRight"
        ) {
          ev.preventDefault();
          unfoldAllNodes();
          refreshMeta();
          renderTree();
          refocusTreeNavigation(state.selectedId);
          persistPipSnapshot();
          setStatus("Unfolded all.", "ok");
          return;
        }
        if (
          (ev.metaKey || ev.ctrlKey)
          && !ev.shiftKey
          && !ev.altKey
          && (ev.key === "ArrowUp" || ev.key === "ArrowDown")
        ) {
          ev.preventDefault();
          const moved = moveSelectionToVisibleEdge(ev.key === "ArrowUp" ? "start" : "end");
          if (!moved) {
            setStatus(
              ev.key === "ArrowUp" ? "Already at the top visible item." : "Already at the bottom visible item.",
              "warn"
            );
          }
          return;
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.shiftKey
          && !ev.altKey
          && ["Home", "End", "PageUp", "PageDown"].includes(ev.key)
        ) {
          if (state.moveMode) return;
          ev.preventDefault();
          const goStart = ev.key === "Home" || ev.key === "PageUp";
          const moved = moveSelectionToVisibleEdge(goStart ? "start" : "end");
          if (!moved) {
            setStatus(
              goStart ? "Already at the top visible item." : "Already at the bottom visible item.",
              "warn"
            );
          }
          return;
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.shiftKey
          && !ev.altKey
          && typeof ev.getModifierState === "function"
          && ev.getModifierState("Fn")
          && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(ev.key)
        ) {
          if (state.moveMode) return;
          ev.preventDefault();
          const goStart = ev.key === "ArrowUp" || ev.key === "ArrowLeft";
          const moved = moveSelectionToVisibleEdge(goStart ? "start" : "end");
          if (!moved) {
            setStatus(
              goStart ? "Already at the top visible item." : "Already at the bottom visible item.",
              "warn"
            );
          }
          return;
        }
        if (state.moveMode) {
          if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(ev.key)) {
            ev.preventDefault();
            if (ev.key === "ArrowUp") moveNodeWithinSiblings(state.selectedId, -1);
            else if (ev.key === "ArrowDown") moveNodeWithinSiblings(state.selectedId, 1);
            else if (ev.key === "ArrowLeft") outdentNodeById(state.selectedId);
            else if (ev.key === "ArrowRight") indentNodeById(state.selectedId);
            armMoveModeIdleTimer();
            refocusTreeNavigation(state.selectedId);
            return;
          }
          if (ev.key === "Enter") {
            ev.preventDefault();
            toggleMoveMode(false);
            setStatus("Move confirmed.", "ok");
            return;
          }
          if (ev.key === "Escape") {
            ev.preventDefault();
            toggleMoveMode(false);
            return;
          }
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.altKey
          && !ev.shiftKey
          && (ev.key === " " || ev.code === "Space")
        ) {
          ev.preventDefault();
          if (!state.selectedId) return;
          const map = nodeMap();
          const current = map.get(state.selectedId);
          if (!current) return;
          const hasKids = sortNodesForParent(current.id).length > 0;
          if (!hasKids) return;
          if (state.collapsed.has(current.id)) state.collapsed.delete(current.id);
          else state.collapsed.add(current.id);
          refreshMeta();
          renderTree();
          refocusTreeNavigation(current.id);
          persistPipSnapshot();
          return;
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.altKey
          && !ev.shiftKey
          && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(ev.key)
        ) {
          ev.preventDefault();
          if (!state.selectedId) {
            moveSelectionByVisibleDelta(1);
            return;
          }
          const map = nodeMap();
          const current = map.get(state.selectedId);
          if (!current) return;
          if (ev.key === "ArrowUp") {
            moveSelectionByVisibleDelta(-1);
            return;
          }
          if (ev.key === "ArrowDown") {
            moveSelectionByVisibleDelta(1);
            return;
          }
          const kids = sortNodesForParent(current.id);
          if (ev.key === "ArrowRight") {
            if (kids.length === 0) return;
            if (state.collapsed.has(current.id)) {
              if (el.treeWrap instanceof HTMLElement) {
                el.treeWrap.focus({ preventScroll: true });
              }
              state.collapsed.delete(current.id);
              refreshMeta();
              renderTree();
              refocusTreeNavigation(current.id);
              persistPipSnapshot();
              return;
            }
            selectNodeById(kids[0].id, { expandPath: true });
            return;
          }
          if (ev.key === "ArrowLeft") {
            if (kids.length > 0 && !state.collapsed.has(current.id)) {
              if (el.treeWrap instanceof HTMLElement) {
                el.treeWrap.focus({ preventScroll: true });
              }
              state.collapsed.add(current.id);
              refreshMeta();
              renderTree();
              refocusTreeNavigation(current.id);
              persistPipSnapshot();
              return;
            }
            if (state.focusRootId === current.id && current.parentId && current.parentId !== "root") {
              if (el.treeWrap instanceof HTMLElement) {
                el.treeWrap.focus({ preventScroll: true });
              }
              state.focusRootId = current.parentId;
              state.selectedId = current.parentId;
              state.collapsed.add(current.parentId);
              refreshMeta();
              renderTree();
              refocusTreeNavigation(current.parentId);
              persistPipSnapshot();
              return;
            }
            if (current.parentId && current.parentId !== "root") {
              selectNodeById(current.parentId, { expandPath: true });
            }
            return;
          }
        }
        if (
          !ev.metaKey
          && !ev.ctrlKey
          && !ev.altKey
          && !ev.shiftKey
          && ev.key === "Enter"
        ) {
          ev.preventDefault();
          if (state.selectedId) {
            const map = nodeMap();
            const current = map.get(state.selectedId) || null;
            const hasKids = !!current && sortNodesForParent(current.id).length > 0;
            if (current && shouldCopyOnSingleClick(current, hasKids)) {
              if (el.search instanceof HTMLInputElement && cleanText(el.search.value, 120)) {
                el.search.value = "";
              }
              refreshMeta();
              renderTree();
              refocusTreeNavigation(current.id);
              void copyText(current.label).then((ok) => {
                if (ok) showCopiedFeedback(current.id);
              });
              return;
            }
          }
          openDetailsEditorForSelectedNode();
          return;
        }
        if (!state.selectedId) return;
        if (ev.key !== "Tab") return;
        ev.preventDefault();
        if (ev.shiftKey) outdentNodeById(state.selectedId);
        else indentNodeById(state.selectedId);
      }

      function renderTree() {
        const query = cleanText(el.search.value, 120).toLowerCase();
        const tokens = query.split(/\s+/).filter(Boolean);
        const byId = nodeMap();
        const byParent = childrenMap();
        if (state.focusRootId && !byId.has(state.focusRootId)) {
          state.focusRootId = "";
        }
        const focusRoot = state.focusRootId ? byId.get(state.focusRootId) : null;

        function matches(node) {
          if (tokens.length === 0) return true;
          const path = getPath(node.id).toLowerCase();
          return tokens.every((t) => path.includes(t));
        }

        function hasVisibleDesc(nodeId) {
          const kids = byParent.get(nodeId) || [];
          for (const kid of kids) {
            if (matches(kid) || hasVisibleDesc(kid.id)) return true;
          }
          return false;
        }

        function depthIndentPx(depth) {
          const d = Math.max(0, Number(depth) || 0);
          if (d <= 0) return 8;
          if (d === 1) return 16;
          if (d === 2) return 24;
          if (d === 3) return 30;
          return 30 + ((d - 3) * 6);
        }

        function build(node, depth) {
          if (!matches(node) && !hasVisibleDesc(node.id)) return null;
          const li = document.createElement("li");
          li.className = "treeNode";

          const row = document.createElement("div");
          row.className = `row${state.selectedId === node.id ? " selected" : ""}`;
          row.setAttribute("data-node-id", node.id);
          row.style.paddingLeft = `${depthIndentPx(depth)}px`;
          row.tabIndex = 0;

          const children = byParent.get(node.id) || [];
          const hasKids = children.length > 0;
          const isCollapsed = state.collapsed.has(node.id);

          const twisty = document.createElement("button");
          twisty.className = `twisty${hasKids ? "" : " empty"}`;
          twisty.textContent = hasKids ? (isCollapsed ? "▸" : "▾") : "•";
          twisty.addEventListener("click", (ev) => {
            ev.stopPropagation();
            if (!hasKids) return;
            if (state.collapsed.has(node.id)) state.collapsed.delete(node.id);
            else state.collapsed.add(node.id);
            renderTree();
          });
          row.appendChild(twisty);

          if (state.inlineEdit.id === node.id) {
            const input = document.createElement("input");
            input.className = "labelEdit";
            input.type = "text";
            input.value = node.label || "";
            input.placeholder = "New item";
            input.setAttribute("data-edit-id", node.id);
            let finished = false;
            const finishCommitWith = (value, options = {}) => {
              if (finished) return;
              finished = true;
              commitInlineEdit(node.id, value, options);
            };
            const finishCommit = () => {
              finishCommitWith(input.value);
            };
            const finishCancel = () => {
              if (finished) return;
              finished = true;
              cancelInlineEdit(node.id);
            };
            input.addEventListener("click", (ev) => ev.stopPropagation());
            input.addEventListener("dblclick", (ev) => ev.stopPropagation());
            input.addEventListener("paste", (ev) => {
              const pasted = String(ev.clipboardData?.getData("text/plain") || "");
              if (!pasted) return;
              const parsed = parseCaptureSlashPathBatch(pasted);
              const looksLikeBatch = parsed.matched && parsed.ok && pasted.includes("\n");
              if (!looksLikeBatch) return;
              ev.preventDefault();
              finishCommitWith(pasted);
            });
            input.addEventListener("keydown", (ev) => {
              ev.stopPropagation();
              if (ev.key === "Enter") {
                ev.preventDefault();
                finishCommit();
                return;
              }
              if (ev.key === "Tab") {
                ev.preventDefault();
                finishCommitWith(input.value, { postAction: ev.shiftKey ? "outdent" : "indent" });
                return;
              }
              if (ev.key === "Escape") {
                ev.preventDefault();
                finishCancel();
              }
            });
            input.addEventListener("blur", () => finishCommit());
            row.appendChild(input);
            if (state.inlineEdit.autoFocus) {
              state.inlineEdit.autoFocus = false;
              requestAnimationFrame(() => {
                if (!document.body.contains(input)) return;
                input.focus({ preventScroll: true });
                input.select();
              });
            }
          } else {
            const label = document.createElement("div");
            label.className = "label";
            label.textContent = node.label;
            label.setAttribute("data-full-label", cleanText(node.label, 500) || getPath(node.id));
            row.appendChild(label);
          }

          const detailText = normaliseDetails(node.details, 4000);
          if (detailText) {
            const detailBadge = document.createElement("span");
            detailBadge.className = "detailBadge";
            detailBadge.textContent = "...";
            detailBadge.title = cleanText(detailText.split("\n")[0], 180) || "Has details";
            row.appendChild(detailBadge);
          }

          const rowActions = document.createElement("div");
          rowActions.className = "rowActions";

          const addBtn = document.createElement("button");
          addBtn.className = "rowActionBtn add";
          addBtn.type = "button";
          addBtn.title = "Add below";
          addBtn.textContent = "+";
          addBtn.addEventListener("click", (ev) => {
            ev.stopPropagation();
            insertSiblingBelow(node.id);
          });
          rowActions.appendChild(addBtn);

          const delBtn = document.createElement("button");
          delBtn.className = "rowActionBtn delete";
          delBtn.type = "button";
          delBtn.title = "Delete";
          delBtn.textContent = "−";
          delBtn.addEventListener("click", (ev) => {
            ev.stopPropagation();
            deleteNodeById(node.id, { confirm: true });
          });
          rowActions.appendChild(delBtn);

          row.appendChild(rowActions);

          row.addEventListener("click", () => {
            const copyOnClick = shouldCopyOnSingleClick(node, hasKids);
            const hasFilterText = cleanText(el.search?.value || "", 120).length > 0;

            if (copyOnClick && hasFilterText && el.search) {
              el.search.value = "";
            }

            state.selectedId = node.id;
            row.focus();
            refreshMeta();
            renderTree();
            focusRowByNodeId(node.id);

            if (copyOnClick) {
              void copyText(node.label).then((ok) => {
                if (ok) showCopiedFeedback(node.id);
              });
            }
          });
          row.addEventListener("dblclick", (ev) => {
            ev.preventDefault();
            ev.stopPropagation();
            const hasFilterText = cleanText(el.search?.value || "", 120).length > 0;
            if (hasFilterText && el.search) {
              el.search.value = "";
            }
            state.selectedId = node.id;
            row.focus();
            refreshMeta();
            renderTree();
            focusRowByNodeId(node.id);
            void copyText(node.label).then((ok) => {
              if (ok) showCopiedFeedback(node.id);
            });
          });

          li.appendChild(row);

          if (hasKids && !isCollapsed) {
            const ul = document.createElement("ul");
            ul.className = "children";
            for (const kid of children) {
              const child = build(kid, depth + 1);
              if (child) ul.appendChild(child);
            }
            if (ul.childNodes.length > 0) li.appendChild(ul);
          }

          return li;
        }

        const roots = focusRoot ? (byParent.get(focusRoot.id) || []).slice() : (byParent.get("root") || []).slice();
        const rendered = [];
        for (const root of roots) {
          const node = build(root, 0);
          if (node) rendered.push(node);
        }

        el.treeRoot.innerHTML = "";
        for (const n of rendered) el.treeRoot.appendChild(n);
        if (rendered.length === 0) {
          const emptyHint = document.createElement("li");
          emptyHint.className = "treeEmptyHint";
          emptyHint.textContent = "Start with +";
          el.treeRoot.appendChild(emptyHint);
        }
        refreshTreeLabelOverflowTitles();
        requestAnimationFrame(() => refreshTreeLabelOverflowTitles());

        if (state.inlineEdit.id) {
          const activeInput = el.treeRoot.querySelector(`[data-edit-id="${state.inlineEdit.id}"]`);
          if (activeInput) {
            requestAnimationFrame(() => {
              activeInput.focus();
              activeInput.select();
            });
          }
        }
      }

      function refreshTreeLabelOverflowTitles() {
        if (!(el.treeRoot instanceof HTMLElement)) return;
        const labels = el.treeRoot.querySelectorAll(".label[data-full-label]");
        for (const labelEl of labels) {
          if (!(labelEl instanceof HTMLElement)) continue;
          const fullText = cleanText(labelEl.getAttribute("data-full-label") || "", 500);
          if (!fullText) {
            labelEl.removeAttribute("title");
            continue;
          }
          const isOverflowed = (labelEl.scrollWidth - labelEl.clientWidth) > 1;
          if (isOverflowed) labelEl.setAttribute("title", fullText);
          else labelEl.removeAttribute("title");
        }
      }

      function maxSiblingOrder(parentId) {
        let max = 1000;
        for (const n of state.nodes) {
          if ((n.parentId || "root") !== parentId) continue;
          if (Number.isFinite(n.order) && n.order > max) max = n.order;
        }
        return max;
      }

      function addChildItems() {
        if (!state.selectedId) {
          setStatus("Select a node first.", "warn");
          return;
        }
        const lines = el.draft.value.split(/\r?\n/).map((s) => cleanText(s, 220)).filter(Boolean);
        if (lines.length === 0) {
          setStatus("Type one or more lines first.", "warn");
          return;
        }
        const parentId = state.selectedId;
