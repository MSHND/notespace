<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pocket PE</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fbfbf8; color: #0f172a; overflow: hidden; }
    .wrap { height: 100vh; display: grid; grid-template-rows: auto minmax(0,1fr); }
    .bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid rgba(148,163,184,.24); background: rgba(255,255,255,.72); }
    .brand { font-size: 13px; font-weight: 650; color: rgba(51,65,85,.8); max-width: 210px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .grow { flex: 1 1 auto; }
    button { border: 0; background: transparent; padding: 4px 7px; border-radius: 999px; font: inherit; font-size: 12px; color: rgba(51,65,85,.82); cursor: pointer; }
    button:hover, button:focus-visible { background: rgba(148,163,184,.16); outline: none; color: #0f172a; }
    button.on { font-style: italic; color: #0f172a; background: rgba(148,163,184,.12); }
    .status { min-width: 80px; font-size: 11px; color: rgba(100,116,139,.72); }
    .hint { font-size: 11px; color: rgba(100,116,139,.58); white-space: nowrap; }
    .main { min-height: 0; padding: 14px; display: grid; grid-template-rows: auto minmax(0,1fr); gap: 10px; }
    input, textarea, .outline { width: 100%; border: 1px solid rgba(148,163,184,.22); border-radius: 15px; background: rgba(255,255,255,.96); color: #0f172a; outline: none; box-shadow: 0 10px 24px -22px rgba(15,23,42,.38); }
    input { min-height: 42px; padding: 9px 12px; font-size: 17px; font-weight: 560; }
    textarea { height: 100%; min-height: 0; resize: none; padding: 14px; font: inherit; font-size: 16px; line-height: 1.52; }
    .outline { height: 100%; min-height: 0; overflow: auto; padding: 10px 8px; user-select: none; }
    .row { display: grid; grid-template-columns: 22px minmax(0,1fr); align-items: start; gap: 4px; min-height: 30px; padding: 1px 4px; border-radius: 9px; }
    .row:focus-within { background: rgba(241,245,249,.82); }
    .row.selected { background: rgba(191,219,254,.72); }
    .row.selected:focus-within { background: rgba(147,197,253,.56); }
    .toggle { width: 22px; min-height: 25px; color: rgba(100,116,139,.75); }
    .toggle.empty { opacity: .38; cursor: default; }
    .text { min-height: 26px; padding: 3px 6px; border-radius: 8px; outline: none; font-size: 16px; line-height: 1.45; white-space: pre-wrap; overflow-wrap: anywhere; user-select: text; }
    .text:empty::before { content: "note"; color: rgba(100,116,139,.34); }
    body.textMode .outline { display: none; }
    body.outlineMode textarea { display: none; }
  </style>
</head>
<body class="outlineMode">
  <main class="wrap">
    <div class="bar">
      <div id="brand" class="brand">PE</div>
      <button id="saveBtn" type="button">save</button>
      <span id="status" class="status">loading</span>
      <button id="textBtn" type="button">text</button>
      <button id="outlineBtn" type="button">outline</button>
      <div class="grow"></div>
      <div class="hint">Drag rows to select · Ctrl+C copies range · Ctrl+S saves</div>
      <button id="closeBtn" type="button">×</button>
    </div>
    <section class="main">
      <input id="title" aria-label="PE title">
      <textarea id="body" aria-label="PE text editor"></textarea>
      <div id="outline" class="outline" aria-label="PE outline editor"></div>
    </section>
  </main>
  <script>
  (function () {
    "use strict";

    const nodeId = decodeURIComponent(String(location.hash || "").replace(/^#/, ""));
    let payload = null;
    try {
      if (window.opener && !window.opener.closed && window.opener.PocketPeEditor && typeof window.opener.PocketPeEditor.getPayload === "function") {
        payload = window.opener.PocketPeEditor.getPayload(nodeId);
      }
    } catch (error) {
      console.error(error);
    }
    if (!payload) {
      payload = { nodeId, nodeLabel: "unknown node", title: "", mode: "outline", text: "", outline: [{ id: "pe_blank", text: "PE could not connect to the selected node.", depth: 0, collapsed: false }] };
    }

    let mode = payload.mode === "text" ? "text" : "outline";
    let blocks = Array.isArray(payload.outline) && payload.outline.length ? payload.outline : [{ id: "pe_blank", text: "", depth: 0, collapsed: false }];
    const selected = new Set([0]);
    let anchorIndex = 0;
    let dragSelecting = false;
    let dirty = false;

    const title = document.getElementById("title");
    const body = document.getElementById("body");
    const outline = document.getElementById("outline");
    const textBtn = document.getElementById("textBtn");
    const outlineBtn = document.getElementById("outlineBtn");
    const status = document.getElementById("status");
    document.getElementById("brand").textContent = "PE · " + (payload.nodeLabel || "node");
    title.value = payload.title || "";
    body.value = payload.text || "";

    function block(text, depth, collapsed) {
      return { id: "b" + Date.now().toString(36) + Math.random().toString(36).slice(2,6), text: text || "", depth: Math.max(0, Math.min(8, depth || 0)), collapsed: collapsed === true };
    }
    function hasChild(i) { return blocks[i + 1] && Number(blocks[i + 1].depth || 0) > Number(blocks[i].depth || 0); }
    function hidden(i) {
      const depth = Number(blocks[i].depth || 0);
      for (let x = i - 1; x >= 0; x -= 1) {
        if (Number(blocks[x].depth || 0) < depth) return blocks[x].collapsed === true || hidden(x);
      }
      return false;
    }
    function outlineToText() {
      return blocks.map((b) => "  ".repeat(Math.max(0, Number(b.depth || 0))) + String(b.text || "")).join("\n");
    }
    function textToOutline() {
      blocks = body.value.split("\n").map((line) => {
        const lead = (line.match(/^\s*/) || [""])[0].replace(/\t/g, "  ").length;
        return block(line.trimStart(), Math.floor(lead / 2), false);
      });
      if (!blocks.length) blocks = [block("", 0, false)];
      selected.clear(); selected.add(0); anchorIndex = 0;
    }
    function setStatus(text) { status.textContent = text || "connected"; }
    function setDirty() { dirty = true; setStatus("editing"); }
    function setMode(next) {
      if (next === mode) return;
      if (next === "outline") { textToOutline(); mode = "outline"; }
      else { body.value = outlineToText(); mode = "text"; }
      setDirty(); render();
    }
    function selectRange(from, to) {
      selected.clear();
      const a = Math.min(from, to);
      const b = Math.max(from, to);
      for (let i = a; i <= b; i += 1) if (!hidden(i)) selected.add(i);
      setStatus(selected.size + " rows selected");
      render(to);
    }
    function copySelected() {
      if (!selected.size) return false;
      const indexes = Array.from(selected).sort((a, b) => a - b);
      const text = indexes.map((i) => "  ".repeat(Math.max(0, Number(blocks[i].depth || 0))) + String(blocks[i].text || "")).join("\n");
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(() => setStatus("copied " + indexes.length + " rows"));
      return true;
    }
    function currentText() { return mode === "outline" ? outlineToText() : body.value; }
    function save() {
      const outgoing = { nodeId: payload.nodeId, title: title.value, mode, text: currentText(), outline: blocks };
      try {
        if (window.opener && !window.opener.closed && window.opener.PocketPeEditor && typeof window.opener.PocketPeEditor.apply === "function") {
          const ok = window.opener.PocketPeEditor.apply(outgoing);
          if (ok) { dirty = false; setStatus("saved"); return; }
        }
      } catch (error) {
        console.error(error);
      }
      setStatus("save failed");
    }
    function render(focusIndex) {
      document.body.classList.toggle("textMode", mode === "text");
      document.body.classList.toggle("outlineMode", mode === "outline");
      textBtn.classList.toggle("on", mode === "text");
      outlineBtn.classList.toggle("on", mode === "outline");
      outline.innerHTML = "";
      blocks.forEach((b, i) => {
        if (hidden(i)) return;
        const row = document.createElement("div");
        row.className = "row" + (selected.has(i) ? " selected" : "");
        row.style.paddingLeft = (4 + Math.max(0, b.depth || 0) * 24) + "px";
        row.addEventListener("mousedown", (ev) => {
          if (ev.button !== 0) return;
          if (ev.shiftKey) selectRange(anchorIndex, i);
          else { selected.clear(); selected.add(i); anchorIndex = i; setStatus("1 row selected"); render(i); }
          dragSelecting = true;
          ev.preventDefault();
        });
        row.addEventListener("mouseenter", () => { if (dragSelecting) selectRange(anchorIndex, i); });
        const t = document.createElement("button");
        t.type = "button";
        t.className = "toggle" + (hasChild(i) ? "" : " empty");
        t.textContent = hasChild(i) ? (b.collapsed ? "▸" : "▾") : "•";
        t.addEventListener("click", (ev) => { ev.stopPropagation(); if (!hasChild(i)) return; b.collapsed = !b.collapsed; setDirty(); render(i); });
        const text = document.createElement("div");
        text.className = "text";
        text.contentEditable = "true";
        text.spellcheck = true;
        text.textContent = b.text || "";
        text.addEventListener("focus", () => { if (!selected.has(i)) { selected.clear(); selected.add(i); anchorIndex = i; render(i); } });
        text.addEventListener("input", () => { b.text = text.textContent || ""; setDirty(); });
        text.addEventListener("keydown", (ev) => {
          if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === "c" && selected.size > 1) { ev.preventDefault(); copySelected(); return; }
          if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); blocks.splice(i + 1, 0, block("", b.depth || 0, false)); selected.clear(); selected.add(i + 1); anchorIndex = i + 1; setDirty(); render(i + 1); return; }
          if (ev.key === "Tab") { ev.preventDefault(); b.depth = Math.max(0, Math.min(8, (b.depth || 0) + (ev.shiftKey ? -1 : 1))); setDirty(); render(i); return; }
          if (ev.key === "Backspace" && !text.textContent && blocks.length > 1) { ev.preventDefault(); blocks.splice(i, 1); selected.clear(); selected.add(Math.max(0, i - 1)); anchorIndex = Math.max(0, i - 1); setDirty(); render(Math.max(0, i - 1)); }
        });
        row.appendChild(t); row.appendChild(text); outline.appendChild(row);
        if (i === focusIndex) requestAnimationFrame(() => text.focus());
      });
    }

    document.addEventListener("mouseup", () => { dragSelecting = false; });
    document.addEventListener("keydown", (ev) => {
      if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === "s") { ev.preventDefault(); save(); }
      if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === "c" && selected.size > 1) { ev.preventDefault(); copySelected(); }
    });
    title.addEventListener("input", setDirty);
    body.addEventListener("input", setDirty);
    textBtn.addEventListener("click", () => setMode("text"));
    outlineBtn.addEventListener("click", () => setMode("outline"));
    document.getElementById("saveBtn").addEventListener("click", save);
    document.getElementById("closeBtn").addEventListener("click", () => { if (!dirty || confirm("Close without saving?")) window.close(); });
    setStatus(payload.nodeId ? "connected" : "not connected");
    render(0);
  })();
  </script>
</body>
</html>
